<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO v39 - Maman Sokal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #000; padding: 10px 15px; border-bottom: 2px solid var(--pink); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .top-bar { display: flex; gap: 8px; padding: 10px; flex-shrink: 0; }
        .btn-top { flex: 1; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; text-align: center; }
        .btn-load { background: var(--cyan); color: #000; }
        .btn-prep { background: var(--green); color: #000; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 10px; overflow-y: auto; max-height: 48vh; flex-shrink: 0; border-bottom: 1px solid #333; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.7rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 6px; text-transform: uppercase; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 1.1rem; }
        
        .adj { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .b-step { width: 50px; height: 50px; background: #000; border: 2px solid var(--pink); color: white; border-radius: 10px; font-size: 1.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        input[type=range] { flex: 1; accent-color: var(--pink); height: 35px; cursor: pointer; }
        select { background: #000; color: white; border: 2px solid var(--pink); padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }

        .joy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 160px; margin: 5px auto; }
        .btn-joy { background: #000; border: 2px solid var(--cyan); color: white; border-radius: 10px; padding: 16px; cursor: pointer; font-weight: bold; font-size: 1.4rem; }

        .viewer { background: #050505; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 10px 0 160px 0; }
        .grid-view { display: grid; gap: 15px; width: 95%; justify-items: center; }
        .page-output { background: white; width: 100%; box-shadow: 0 0 20px rgba(255,0,127,0.4); border: 1px solid #ddd; }

        #printZone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 20px; }
        .close-btn { position: sticky; top: 10px; background: var(--pink); color: white; border: none; padding: 22px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; z-index: 1001; font-size: 1.3rem; font-family: 'Oswald'; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; font-size:1.2rem; letter-spacing:1px;">STENCIL PRINT PRO v39</h1>
    <div style="color:var(--pink); font-size:0.8rem; font-weight:bold;">MAMAN SOKAL 🖤</div>
</header>

<div class="top-bar">
    <label class="btn-top btn-load" for="f">✦ IMAGE</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-top btn-prep" id="pBtn" disabled onclick="openPrintZone()">IMPRIMER</button>
</div>

<div class="controls">
    <div class="card card-full">
        <label>MODE DE RENDU</label>
        <select id="mde" onchange="proc()">
            <option value="orig">ORIGINAL (RÉGLAGES)</option>
            <option value="stencil">STENCIL (COLORIAGE)</option>
            <option value="dotwork">DOTWORK (OMBRES)</option>
            <option value="photo">RÉALISTE N&B</option>
        </select>
    </div>

    <div class="card"><label>NETTETÉ <span class="val" id="vN">10</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sN',-1)">-</button><input type="range" id="sN" min="0" max="40" value="10" oninput="proc()"><button class="b-step" onclick="ch('sN',1)">+</button></div>
    </div>
    <div class="card"><label>CONTRASTE <span class="val" id="vC">128</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sC',-5)">-</button><input type="range" id="sC" min="0" max="255" value="128" oninput="proc()"><button class="b-step" onclick="ch('sC',5)">+</button></div>
    </div>
    
    <div class="card"><label>NETTOYAGE FOND <span class="val" id="vK">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sK',-5)">-</button><input type="range" id="sK" min="0" max="200" value="0" oninput="proc()"><button class="b-step" onclick="ch('sK',5)">+</button></div>
    </div>
    <div class="card"><label>CHAUFFE NOIR <span class="val" id="vI">150</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sT',-10)">-</button><input type="range" id="sT" min="10" max="250" value="150" oninput="proc()"><button class="b-step" onclick="ch('sT',10)">+</button></div>
    </div>

    <div class="card card-full"><label>GABARIT DE SORTIE XXL</label>
        <select id="pgs" onchange="setG(this.value)">
            <option value="1">1 Feuille (Standard)</option>
            <option value="2">2 Feuilles (1x2)</option>
            <option value="4">4 Feuilles (2x2)</option>
            <option value="6">6 Feuilles (2x3)</option>
            <option value="9">9 Feuilles (3x3)</option>
            <option value="12">12 Feuilles (3x4)</option>
        </select>
    </div>

    <div class="card"><label>TAILLE DESSIN (%) <span class="val" id="vS">100%</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sS',-5)">-</button><input type="range" id="sS" min="10" max="600" value="100" oninput="up()"><button class="b-step" onclick="ch('sS',5)">+</button></div>
    </div>
    <div class="card"><label>PLACEMENT</label>
        <div class="joy-grid">
            <div></div><button class="btn-joy" onclick="mov(0,-50)">↑</button><div></div>
            <button class="btn-joy" onclick="mov(-50,0)">←</button><button class="btn-joy" onclick="resetPos()">•</button><button class="btn-joy" onclick="mov(50,0)">→</button>
            <div></div><button class="btn-joy" onclick="mov(0,50)">↓</button><div></div>
        </div>
    </div>
</div>

<div class="viewer"><div id="gv" class="grid-view"></div></div>

<div id="printZone">
    <button class="close-btn" onclick="closePrintZone()">✖ RETOUR</button>
    <div id="printContainer" style="display:grid; gap:30px; justify-items:center;"></div>
</div>

<script>
    let A4W = 805, A4H = 1152; 
    let st = { img: null, res: null, p: 1, sz: 100, offX: 0, offY: 0 };

    function ch(id, d) { 
        let e = document.getElementById(id); let v = parseFloat(e.value) + d; 
        if(v >= e.min && v <= e.max) { e.value = v; if(id==='sS') up(); else proc(); } 
    }

    function mov(x, y) { st.offX += x; st.offY += y; render(); }
    function resetPos() { st.offX = 0; st.offY = 0; render(); }

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader(); 
        r.onload = (ev) => {
            const i = new Image(); 
            i.onload = () => { st.img = i; document.getElementById('pBtn').disabled = false; proc(); }; 
            i.src = ev.target.result;
        }; r.readAsDataURL(file);
    };

    function proc() {
        if(!st.img) return; 
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height; 
        const x = c.getContext('2d');
        const mode = document.getElementById('mde').value;
        const n = parseInt(document.getElementById('sN').value);
        const t = parseInt(document.getElementById('sT').value);
        const ct = parseInt(document.getElementById('sC').value);
        const dens = 2; // Densité fixée pour la finesse v39
        const clean = parseInt(document.getElementById('sK').value);

        document.getElementById('vN').innerText = n; document.getElementById('vI').innerText = t; 
        document.getElementById('vC').innerText = ct; document.getElementById('vK').innerText = clean;

        x.filter = `grayscale(100%) contrast(${ct}%)`;
        x.drawImage(st.img, 0, 0);
        
        if(n > 0) { 
            x.globalCompositeOperation = 'overlay';
            x.filter = `contrast(${100 + n * 4}%)`;
            x.drawImage(c, 0, 0);
            x.globalCompositeOperation = 'source-over';
        }

        let idat = x.getImageData(0,0,c.width,c.height);
        let px = idat.data;
        let thresh = 255 - t;

        if(clean > 0) {
            for(let i=0; i<px.length; i+=4) {
                let v = (px[i]+px[i+1]+px[i+2])/3;
                if(v > (255 - clean)) { px[i]=px[i+1]=px[i+2]=255; }
            }
        }

        if (mode !== 'orig') {
            if (mode === 'dotwork') {
                let outat = x.createImageData(c.width, c.height);
                let out = outat.data;
                for (let i = 0; i < out.length; i += 4) { out[i] = out[i+1] = out[i+2] = 255; out[i+3] = 255; }
                for(let y = 0; y < c.height; y += dens) {
                    for(let x_pos = 0; x_pos < c.width; x_pos += dens) {
                        let idx = (y * c.width + x_pos) * 4;
                        let val = (px[idx] + px[idx+1] + px[idx+2]) / 3;
                        if (val < thresh + (Math.random() * 60 - 30)) {
                            let pSize = Math.max(1, dens - 1);
                            for(let dy=0; dy<pSize; dy++) {
                                for(let dx=0; dx<pSize; dx++) {
                                    let oIdx = ((y+dy) * c.width + (x_pos+dx)) * 4;
                                    if (oIdx < out.length) { out[oIdx] = out[oIdx+1] = out[oIdx+2] = 0; }
                                }
                            }
                        }
                    }
                }
                x.putImageData(outat, 0, 0);
            } else if (mode === 'stencil') {
                let w = c.width;
                let outat = x.createImageData(c.width, c.height);
                let out = outat.data;
                for(let i=0; i<px.length; i+=4) {
                    let v = px[i];
                    let r = px[i+4] || v;
                    let d = px[i + w*4] || v;
                    let diff = Math.abs(v - r) + Math.abs(v - d);
                    let res = (diff > (255-t)/5.5) ? 0 : 255;
                    out[i]=out[i+1]=out[i+2]=res; out[i+3]=255;
                }
                x.putImageData(outat, 0, 0);
            } else { 
                for(let i=0; i<px.length; i+=4) {
                    let v = (px[i]+px[i+1]+px[i+2])/3;
                    let res = (v > thresh) ? 255 : 0;
                    px[i]=px[i+1]=px[i+2]=res;
                }
                x.putImageData(idat, 0, 0);
            }
        } else {
            x.putImageData(idat, 0, 0);
        }
        const r = new Image(); r.onload = () => { st.res = r; render(); }; r.src = c.toDataURL();
    }

    function setG(v) { st.p = parseInt(v); render(); }
    function up() { st.sz = document.getElementById('sS').value; document.getElementById('vS').innerText = st.sz+'%'; render(); }

    function render() {
        if(!st.res) return; 
        const g = document.getElementById('gv'); g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;

        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W; c.height = A4H; 
            const x = c.getContext('2d');
            x.fillStyle = 'white'; x.fillRect(0,0,A4W,A4H);
            const totalW = A4W * cfg[1];
            const w = (totalW * st.sz / 100);
            const h = st.res.height * (w / st.res.width);
            const sx = (totalW - w)/2 - ((i%cfg[1]) * A4W) + st.offX;
            const sy = (A4H * cfg[0] - h)/2 - (Math.floor(i/cfg[1]) * A4H) + st.offY;
            x.drawImage(st.res, sx, sy, w, h);
            const imgOut = new Image(); imgOut.src = c.toDataURL("image/png"); imgOut.className = "page-output";
            g.appendChild(imgOut);
        }
    }

    function openPrintZone() {
        const zone = document.getElementById('printZone');
        const container = document.getElementById('printContainer');
        container.innerHTML = '';
        document.querySelectorAll('.page-output').forEach((img, idx) => {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<label style="color:white;display:block;text-align:center;margin-bottom:15px;font-family:'Oswald';">FEUILLE ${idx+1}</label>`;
            const nImg = new Image(); nImg.src = img.src; nImg.style.width = "90vw"; nImg.style.border = "2px solid white";
            wrap.appendChild(nImg); container.appendChild(wrap);
        });
        zone.style.display = 'block';
    }
    function closePrintZone() { document.getElementById('printZone').style.display = 'none'; }
</script>
</body>
</html>
