<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO v54 - Maman Sokal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 10px 15px; border-bottom: 2px solid var(--pink); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        
        .import-zone { background: #1a1a20; padding: 20px; border: 3px dashed var(--cyan); margin: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .import-zone.success { border-color: var(--green); background: #0a200a; }
        .btn-load-text { color: var(--cyan); font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        
        .action-bar { display: flex; gap: 8px; padding: 0 10px 10px; flex-shrink: 0; }
        .btn-act { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 0.9rem; }
        .btn-save { background: var(--green); color: #000; }
        .btn-reset { background: var(--red); color: #fff; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 10px; overflow-y: auto; max-height: 45vh; flex-shrink: 0; border-bottom: 1px solid #333; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.65rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 1rem; }
        .adj { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .b-step { width: 42px; height: 42px; background: #000; border: 2px solid var(--pink); color: white; border-radius: 8px; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }
        
        input[type=range] { flex: 1; accent-color: var(--pink); height: 35px; }
        select { background: #000; color: white; border: 2px solid var(--pink); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1rem; }

        .viewer { background: #050505; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        .gabarit-header { width: 100%; padding: 12px; background: #000; color: var(--cyan); font-family: 'Oswald'; text-align: center; border-top: 1px solid #333; letter-spacing: 1px; }
        .grid-view { display: grid; gap: 15px; width: 95%; justify-items: center; margin-top: 10px; }
        .page-output { background: white; width: 100%; border: 1px solid #ddd; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #printZone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 20px; }
        .close-btn { position: sticky; top: 10px; background: var(--pink); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; z-index: 1001; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; font-size:1.1rem;">STENCIL PRINT PRO v54</h1>
    <div style="color:var(--pink); font-size:0.75rem; font-weight:bold;">MAMAN SOKAL 🖤</div>
</header>

<div class="import-zone" id="dropZone" onclick="document.getElementById('f').click()">
    <div class="btn-load-text" id="loadStatus">✦ CLIQUEZ POUR CHOISIR LA PHOTO ✦</div>
    <input type="file" id="f" hidden accept="image/*">
</div>

<div class="action-bar">
    <button class="btn-act btn-reset" onclick="location.reload()">✖ RÉINITIALISER</button>
    <button class="btn-act btn-save" id="pBtn" disabled onclick="openPrintZone()">PRÉPARER A4</button>
</div>

<div class="controls">
    <div class="card card-full">
        <label>MODE DE RENDU</label>
        <select id="mde" onchange="autoAdjustMode()">
            <option value="orig">PHOTO ORIGINALE</option>
            <option value="stencil" selected>STENCIL (LIGNES)</option>
            <option value="dotwork">DOTWORK (POINTS)</option>
        </select>
    </div>

    <div class="card"><label>LUMINOSITÉ <span class="val" id="vL">100</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sL',-5)">-</button><input type="range" id="sL" min="50" max="150" value="100" oninput="proc()"><button class="b-step" onclick="ch('sL',10)">+</button></div>
    </div>
    <div class="card"><label>CONTRASTE <span class="val" id="vC">100</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sC',-5)">-</button><input type="range" id="sC" min="50" max="200" value="100" oninput="proc()"><button class="b-step" onclick="ch('sC',5)">+</button></div>
    </div>
    <div class="card"><label>NETTETÉ IMAGE <span class="val" id="vN">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sN',-1)">-</button><input type="range" id="sN" min="0" max="30" value="0" oninput="proc()"><button class="b-step" onclick="ch('sN',1)">+</button></div>
    </div>
    <div class="card"><label>NETTETÉ LIGNES <span class="val" id="vNL">5</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sNL',-1)">-</button><input type="range" id="sNL" min="1" max="15" value="5" oninput="proc()"><button class="b-step" onclick="ch('sNL',1)">+</button></div>
    </div>
    <div class="card"><label>INTENSITÉ NOIR <span class="val" id="vI">128</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sT',-10)">-</button><input type="range" id="sT" min="10" max="250" value="128" oninput="proc()"><button class="b-step" onclick="ch('sT',10)">+</button></div>
    </div>
    <div class="card"><label>ÉPAISSEUR <span class="val" id="vE">1</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sE',-1)">-</button><input type="range" id="sE" min="1" max="5" value="1" oninput="proc()"><button class="b-step" onclick="ch('sE',1)">+</button></div>
    </div>
    <div class="card card-full"><label>DÉCOUPE : NOMBRE DE FEUILLES A4</label>
        <select id="pgs" onchange="setG(this.value)">
            <option value="1">1 FEUILLE (A4)</option>
            <option value="2">2 FEUILLES</option>
            <option value="4">4 FEUILLES</option>
            <option value="6">6 FEUILLES</option>
            <option value="9">9 FEUILLES</option>
            <option value="12">12 FEUILLES</option>
        </select>
    </div>
    <div class="card card-full"><label>AGRANDISSEMENT (%) <span class="val" id="vS">100%</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sS',-10)">-</button><input type="range" id="sS" min="10" max="600" value="100" oninput="up()"><button class="b-step" onclick="ch('sS',10)">+</button></div>
    </div>
</div>

<div class="viewer">
    <div class="gabarit-header" id="gHeader">PRÉVISUALISATION DES FEUILLES</div>
    <div id="gv" class="grid-view"></div>
</div>

<div id="printZone">
    <button class="close-btn" onclick="closePrintZone()">✖ RETOUR AUX RÉGLAGES</button>
    <div id="printContainer"></div>
</div>

<script>
    const A4W = 805, A4H = 1152; 
    let st = { img: null, res: null, p: 1, sz: 100 };

    // FORCE L'IMPORTATION SUR TOUS LES APPAREILS
    document.getElementById('f').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('loadStatus').innerText = "TRAITEMENT...";
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                st.img = img;
                document.getElementById('pBtn').disabled = false;
                document.getElementById('loadStatus').innerText = "PHOTO CHARGÉE ✓";
                document.getElementById('dropZone').classList.add('success');
                autoAdjustMode(); // Lance immédiatement le calcul
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function ch(id, d) { 
        let e = document.getElementById(id); let v = parseFloat(e.value) + d; 
        if(v >= e.min && v <= e.max) { e.value = v; if(id==='sS') up(); else proc(); } 
    }

    function autoAdjustMode() {
        const m = document.getElementById('mde').value;
        if(m === 'orig') { document.getElementById('sL').value = 100; document.getElementById('sC').value = 100; document.getElementById('sN').value = 0; }
        else if (m === 'stencil') { document.getElementById('sL').value = 110; document.getElementById('sC').value = 140; document.getElementById('sT').value = 120; document.getElementById('sE').value = 1; document.getElementById('sNL').value = 6; }
        else if (m === 'dotwork') { document.getElementById('sL').value = 100; document.getElementById('sC').value = 110; document.getElementById('sT').value = 140; document.getElementById('sE').value = 1; }
        proc();
    }

    function proc() {
        if(!st.img) return; 
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height; 
        const x = c.getContext('2d', { willReadFrequently: true });
        const mode = document.getElementById('mde').value, l = parseInt(document.getElementById('sL').value), ct = parseInt(document.getElementById('sC').value), t = parseInt(document.getElementById('sT').value), e = parseInt(document.getElementById('sE').value), nl = parseInt(document.getElementById('sNL').value);

        ['vL','vC','vN','vNL','vI','vE'].forEach(id => {
            const el = document.getElementById(id.replace('v','s'));
            if(el) document.getElementById(id).innerText = el.value;
        });

        x.filter = `brightness(${l}%) contrast(${ct}%) grayscale(${mode==='orig'?0:100}%)`;
        x.drawImage(st.img, 0, 0);
        
        if (mode !== 'orig') {
            let idat = x.getImageData(0,0,c.width,c.height), px = idat.data, outat = x.createImageData(c.width, c.height), out = outat.data;
            for (let i = 0; i < out.length; i += 4) { out[i]=out[i+1]=out[i+2]=255; out[i+3]=255; }
            if(mode === 'stencil') {
                for(let i=0; i<px.length; i+=4) {
                    if(Math.abs(px[i] - (px[i+4]||px[i])) + Math.abs(px[i] - (px[i+c.width*4]||px[i])) > (255-t)/(nl/2)) {
                        for(let ty=-e+1; ty<e; ty++) for(let tx=-e+1; tx<e; tx++) {
                            let oIdx = i + (ty*c.width*4) + (tx*4);
                            if(oIdx >= 0 && oIdx < out.length) out[oIdx]=out[oIdx+1]=out[oIdx+2]=0;
                        }
                    }
                }
            } else if (mode === 'dotwork') {
                for(let i=0; i<px.length; i+=4) {
                    if(px[i] < (255-t + (Math.random()*60-30))) {
                        for(let dy=0; dy<e; dy++) for(let dx=0; dx<e; dx++) {
                            let oIdx = i + (dy*c.width*4) + (dx*4);
                            if(oIdx < out.length) out[oIdx]=out[oIdx+1]=out[oIdx+2]=0;
                        }
                    }
                }
            }
            x.putImageData(outat, 0, 0);
        }
        st.res = c; 
        render();
    }

    function setG(v) { st.p = parseInt(v); render(); }
    function up() { st.sz = document.getElementById('sS').value; document.getElementById('vS').innerText = st.sz+'%'; render(); }

    function render() {
        if(!st.res) return; 
        const g = document.getElementById('gv'); g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;
        
        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const pc = document.createElement('canvas'); pc.width = A4W; pc.height = A4H; 
            const ctx = pc.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0,0,A4W,A4H);
            const tW = A4W * cfg[1], fW = (tW * st.sz / 100), fH = st.res.height * (fW / st.res.width);
            const sX = (tW - fW)/2 - ((i%cfg[1]) * A4W), sY = (A4H * cfg[0] - fH)/2 - (Math.floor(i/cfg[1]) * A4H);
            ctx.drawImage(st.res, sX, sY, fW, fH);
            const imgEl = new Image(); 
            imgEl.src = pc.toDataURL('image/jpeg', 0.8); 
            imgEl.className = "page-output";
            g.appendChild(imgEl);
        }
    }

    function openPrintZone() {
        const zone = document.getElementById('printZone'), container = document.getElementById('printContainer');
        container.innerHTML = '';
        document.querySelectorAll('.page-output').forEach((img, idx) => {
            const wrap = document.createElement('div'); wrap.style.marginBottom = "30px";
            wrap.innerHTML = `<label style="color:white;display:block;text-align:center;margin-bottom:10px;font-family:'Oswald';text-transform:uppercase;">FEUILLE ${idx+1}</label>`;
            const nImg = new Image(); nImg.src = img.src; nImg.style.width = "100%"; nImg.style.border = "2px solid white";
            wrap.appendChild(nImg); container.appendChild(wrap);
        });
        zone.style.display = 'block';
    }
    function closePrintZone() { document.getElementById('printZone').style.display = 'none'; }
</script>
</body>
</html>
