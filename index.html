<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stencil Print Pro - Maman Sokal v10</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- TON NOUVEAU THÈME DE COULEURS --- */
        :root {
            /* Couleurs principales inspirées de ton image */
            --warm-beige: #F4EBD0;    /* Fond principal, doux et chaleureux */
            --terracotta: #B35B47;     /* Couleur d'accent pour boutons et curseurs */
            --dark-brown: #2C201C;     /* Fond des panneaux de contrôle, profond et mystérieux */
            --text-dark: #3E302A;      /* Texte principal, pour une lecture reposante */
            --text-light: #F4EBD0;     /* Texte sur fond sombre, pour une parfaite visibilité */
            --border: #A18E84;         /* Lignes de séparation douces, pour une interface aérée */
            
            /* Couleurs utilitaires (inchangées) */
            --vert:#00FF66;            /* Pour le bouton "⊕ PHOTO" et les succès */
            --mauve:#CC44FF;           /* Pour le bouton "👀 ORIGINAL" */
        }
        /* ------------------------------------ */

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--warm-beige); 
            color: var(--text-dark); 
            font-family: 'DM Sans', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        header { 
            background: var(--dark-brown); 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 3px solid var(--terracotta); /* Ligne d'accent forte */
            color: var(--text-light);
        }
        .m-btn { 
            background: #4A3A35; /* Un brun moyen pour les boutons par défaut */
            color: var(--text-light); 
            border: 1px solid var(--border); 
            padding: 10px 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        .m-btn:hover { background: #5C4A42; }
        .m-btn.active { background: var(--terracotta); border: none; }
        .m-btn.active:hover { background: #C66A55; }
        .m-btn.save { background: var(--vert); color: black; border: none; }
        .m-btn.save:hover { background: #33FF88; }
        .m-btn.util { background: #5C4A42; border: none; font-size: 0.65rem; padding: 8px 12px; }

        .toolbar { 
            background: var(--dark-brown); 
            padding: 10px 16px; 
            display: flex; 
            gap: 20px; 
            border-bottom: 1px solid var(--border); 
            overflow-x: auto; 
            align-items: flex-start; 
            color: var(--text-light);
        }
        .group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; min-width: 175px; }
        label { font-size: 0.6rem; text-transform: uppercase; color: var(--terracotta); font-weight: 700; }
        
        .ctrl-row { display: flex; align-items: center; gap: 5px; width: 100%; }
        .btn-adj { 
            background: #4A3A35; 
            border: none; 
            color: var(--text-light); 
            width: 28px; 
            height: 28px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            flex-shrink: 0; 
            transition: background 0.2s;
        }
        .btn-adj:hover { background: #5C4A42; }

        .workspace { flex: 1; overflow: auto; padding: 40px; background: rgba(244, 235, 208, 0.5); /* Fond de zone de travail semi-transparent */ display: flex; justify-content: center; align-items: flex-start; }
        .grid-container { display: flex; gap: 10px; justify-content: center; transition: transform 0.2s; transform-origin: top center; }
        .pg-preview { background: white; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        #exportModal { display: none; position: fixed; inset: 0; background: rgba(44, 32, 28, 0.98); z-index: 1000; flex-direction: column; color: var(--text-light); }
        #exportModal.visible { display: flex; }
        .modal-header { padding: 20px; background: var(--dark-brown); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .export-gallery { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        input[type=range] { accent-color: var(--terracotta); flex: 1; cursor: pointer; }
        select { background: #4A3A35; color: var(--text-light); border: 1px solid var(--border); padding: 8px; border-radius: 6px; font-size: 0.8rem; width: 100%; }
        .toggle-group { display: flex; gap: 4px; background: #4A3A35; padding: 3px; border-radius: 6px; }
        .tgl-btn { flex: 1; padding: 6px; font-size: 0.6rem; border: none; background: transparent; color: #A18E84; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .tgl-btn.active { background: var(--mauve); color: white; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <h2 style="font-family: 'Playfair Display'; color: var(--warm-beige); font-size: 1.1rem;">Stencil Print Pro</h2>
        <button class="m-btn util" onclick="undo()">⟲ ANNULER</button>
        <button class="m-btn util" id="btnCompare" style="background:var(--mauve)">👀 ORIGINAL</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <label class="m-btn save" for="upload">⊕ PHOTO</label>
        <input type="file" id="upload" accept="image/*" hidden>
        <button class="m-btn active" id="btnExport" disabled onclick="openExport()">⬇ ENREGISTRER</button>
    </div>
</header>

<div class="toolbar">
    <div class="group">
        <label>Format & Pages</label>
        <div class="toggle-group">
            <button class="tgl-btn active" id="tglP" onclick="setPaperOri('P')">PORTRAIT</button>
            <button class="tgl-btn" id="tglL" onclick="setPaperOri('L')">PAYSAGE</button>
        </div>
        <select id="sPgs" onchange="updateUI()" style="margin-top:5px">
            <option value="1">1 Page</option>
            <option value="2">2 Pages</option>
            <option value="4">4 Pages (2x2)</option>
            <option value="6">6 Pages (3x2)</option>
            <option value="9">9 Pages (3x3)</option>
            <option value="12">12 Pages (4x3)</option>
        </select>
    </div>

    <div class="group">
        <label>Taille Image : <span id="vSize" style="color:var(--warm-beige)">100%</span></label>
        <div class="ctrl-row">
            <button class="btn-adj" onclick="adjVal('sSize', -5)">-</button>
            <input type="range" id="sSize" min="10" max="600" value="100" oninput="updateUI()">
            <button class="btn-adj" onclick="adjVal('sSize', 5)">+</button>
        </div>
        <label style="margin-top:5px">Recouvrement : <span id="vOver" style="color:var(--warm-beige)">20px</span></label>
        <div class="ctrl-row">
            <button class="btn-adj" onclick="adjVal('sOver', -5)">-</button>
            <input type="range" id="sOver" min="0" max="150" value="20" oninput="updateUI()">
            <button class="btn-adj" onclick="adjVal('sOver', 5)">+</button>
        </div>
    </div>

    <div class="group">
        <label>Ajustements Visuels</label>
        <div class="ctrl-row">
            <button class="btn-adj" onclick="adjVal('sBrig', -5)">-</button>
            <input type="range" id="sBrig" min="50" max="150" value="100" oninput="updateImageProcess()">
            <button class="btn-adj" onclick="adjVal('sBrig', 5)">+</button>
        </div>
        <div class="ctrl-row" style="margin-top:5px">
            <button class="btn-adj" onclick="adjVal('sCont', -5)">-</button>
            <input type="range" id="sCont" min="50" max="250" value="100" oninput="updateImageProcess()">
            <button class="btn-adj" onclick="adjVal('sCont', 5)">+</button>
        </div>
        <div class="ctrl-row" style="margin-top:5px">
            <button class="btn-adj" onclick="adjVal('sSharp', -1)">-</button>
            <input type="range" id="sSharp" min="0" max="15" value="0" step="0.5" oninput="updateImageProcess()">
            <button class="btn-adj" onclick="adjVal('sSharp', 1)">+</button>
        </div>
    </div>

    <div class="group">
        <label>Mode & Seuil</label>
        <select id="selMode" onchange="updateImageProcess()">
            <option value="stencil">LIVRE À COLORIER</option>
            <option value="std">PHOTO</option>
            <option value="dot">DOTWORK</option>
        </select>
        <div class="ctrl-row" style="margin-top:5px">
            <button class="btn-adj" onclick="adjVal('sThres', -5)">-</button>
            <input type="range" id="sThres" min="20" max="230" value="128" oninput="updateImageProcess()">
            <button class="btn-adj" onclick="adjVal('sThres', 5)">+</button>
        </div>
        <label style="margin-top:5px">Vue (Loupe) : <span id="vZoom" style="color:var(--warm-beige)">60%</span></label>
        <div class="ctrl-row">
            <button class="btn-adj" onclick="adjVal('sZoom', -5)">-</button>
            <input type="range" id="sZoom" min="10" max="100" value="60" oninput="updateUI()">
            <button class="btn-adj" onclick="adjVal('sZoom', 5)">+</button>
        </div>
    </div>

    <div class="group" style="min-width: 110px;">
        <label>Position Image</label>
        <div style="display: grid; grid-template-columns: repeat(3, 30px); gap: 2px; justify-content: center;">
            <div></div><button class="btn-adj" onclick="move(0,-30)">▲</button><div></div>
            <button class="btn-adj" onclick="move(-30,0)">◀</button>
            <button class="btn-adj" onclick="resetPos()">◎</button>
            <button class="btn-adj" onclick="move(30,0)">▶</button>
            <div></div><button class="btn-adj" onclick="move(0,30)">▼</button><div></div>
        </div>
    </div>
</div>

<div class="workspace">
    <div class="grid-container" id="grid"></div>
</div>

<div id="exportModal">
    <div class="modal-header">
        <h3 style="color:var(--warm-beige)">Exportation Haute Précision (Ozer)</h3>
        <button class="m-btn active" onclick="closeExport()">RETOUR</button>
    </div>
    <div class="export-gallery" id="exportGallery"></div>
</div>

<script>
    let A4_W = 805; let A4_H = 1152;
    let state = { imgOrig: null, imgProc: null, size: 100, pages: "1", offX: 0, offY: 0, paperOri: 'P', isComparing: false, uiZoom: 60, overlap: 20 };
    let history = [];

    function adjVal(id, delta) {
        const el = document.getElementById(id);
        el.value = parseFloat(el.value) + delta;
        if(id === 'sSize' || id === 'sZoom' || id === 'sOver') { saveHistory(); updateUI(); } 
        else { updateImageProcess(); }
    }

    function saveHistory() {
        if (history.length > 20) history.shift();
        history.push(JSON.stringify({size: state.size, offX: state.offX, offY: state.offY, overlap: state.overlap}));
    }
    
    function undo() {
        if (history.length > 0) {
            let prev = JSON.parse(history.pop());
            state.size = prev.size; state.offX = prev.offX; state.offY = prev.offY; state.overlap = prev.overlap;
            document.getElementById('sSize').value = state.size;
            document.getElementById('sOver').value = state.overlap;
            updateUI();
        }
    }

    function setPaperOri(o) {
        state.paperOri = o;
        if(o === 'P') { A4_W = 805; A4_H = 1152; } else { A4_W = 1152; A4_H = 805; }
        document.getElementById('tglP').classList.toggle('active', o === 'P');
        document.getElementById('tglL').classList.toggle('active', o === 'L');
        render();
    }

    const cmpBtn = document.getElementById('btnCompare');
    cmpBtn.onmousedown = () => { state.isComparing = true; render(); };
    cmpBtn.onmouseup = () => { state.isComparing = false; render(); };
    cmpBtn.ontouchstart = (e) => { e.preventDefault(); state.isComparing = true; render(); };
    cmpBtn.ontouchend = () => { state.isComparing = false; render(); };

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => { state.imgOrig = img; document.getElementById('btnExport').disabled = false; updateImageProcess(); };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function updateImageProcess() {
        if(!state.imgOrig) return;
        const cvs = document.createElement('canvas');
        cvs.width = state.imgOrig.width; cvs.height = state.imgOrig.height;
        const ctx = cvs.getContext('2d');
        const sharp = document.getElementById('sSharp').value;
        ctx.filter = `brightness(${document.getElementById('sBrig').value}%) contrast(${document.getElementById('sCont').value}%) grayscale(100%) contrast(${100 + sharp*15}%)`;
        ctx.drawImage(state.imgOrig, 0, 0);

        const mode = document.getElementById('selMode').value;
        if(mode === 'stencil') applyStencil(cvs, ctx);
        else if(mode === 'dot') applyDotwork(cvs, ctx);

        const res = new Image();
        res.onload = () => { state.imgProc = res; render(); };
        res.src = cvs.toDataURL();
    }

    function applyStencil(cvs, ctx) {
        let data = ctx.getImageData(0,0,cvs.width,cvs.height);
        const thres = document.getElementById('sThres').value;
        for(let i=0; i<data.data.length; i+=4) {
            let v = (data.data[i] > thres) ? 255 : 0;
            data.data[i] = data.data[i+1] = data.data[i+2] = v;
        }
        ctx.putImageData(data, 0, 0);
        const input = ctx.getImageData(0,0,cvs.width,cvs.height).data;
        const output = ctx.createImageData(cvs.width,cvs.height);
        for (let y = 1; y < cvs.height-1; y++) {
            for (let x = 1; x < cvs.width-1; x++) {
                const i = (y * cvs.width + x) * 4;
                const diff = Math.abs(input[i] - input[i+4]) + Math.abs(input[i] - input[i + cvs.width*4]);
                const val = (diff > 40) ? 0 : 255;
                output.data[i] = output.data[i+1] = output.data[i+2] = val; output.data[i+3] = 255;
            }
        }
        ctx.putImageData(output, 0, 0);
    }

    function applyDotwork(cvs, ctx) {
        let data = ctx.getImageData(0,0,cvs.width,cvs.height);
        ctx.fillStyle = 'white'; ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle = 'black';
        const thres = document.getElementById('sThres').value;
        for(let y=0; y<cvs.height; y+=10) {
            for(let x=0; x<cvs.width; x+=10) {
                if(data.data[(y*cvs.width+x)*4] < thres) {
                    ctx.beginPath(); ctx.arc(x,y,1.5,0,7); ctx.fill();
                }
            }
        }
    }

    function updateUI() {
        state.size = document.getElementById('sSize').value;
        state.pages = document.getElementById('sPgs').value;
        state.uiZoom = document.getElementById('sZoom').value;
        state.overlap = parseInt(document.getElementById('sOver').value);
        document.getElementById('vSize').innerText = state.size + '%';
        document.getElementById('vZoom').innerText = state.uiZoom + '%';
        document.getElementById('vOver').innerText = state.overlap + 'px';
        render();
    }

    function move(x,y) { saveHistory(); state.offX += x; state.offY += y; render(); }
    function resetPos() { saveHistory(); state.offX = 0; state.offY = 0; render(); }

    function getGrid() {
        let p = parseInt(state.pages);
        if(p === 1) return {r:1, c:1};
        if(p === 2) return {r:1, c:2};
        if(p === 4) return {r:2, c:2};
        if(p === 6) return {r:2, c:3};
        if(p === 9) return {r:3, c:3};
        if(p === 12) return {r:3, c:4};
        return {r:1, c:1};
    }

    function render() {
        if(!state.imgProc) return;
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        grid.style.transform = `scale(${state.uiZoom/100})`;
        const config = getGrid();
        grid.style.display = "grid"; 
        grid.style.gridTemplateColumns = `repeat(${config.c}, 1fr)`;

        for(let i=0; i < (config.r * config.c); i++) {
            const cvs = document.createElement('canvas');
            cvs.width = A4_W; cvs.height = A4_H;
            cvs.className = 'pg-preview';
            drawPage(cvs, Math.floor(i/config.c), i%config.c, 1, config.r, config.c);
            grid.appendChild(cvs);
        }
    }

    function drawPage(cvs, r, c, scale, totalR, totalC) {
        const ctx = cvs.getContext('2d');
        const source = state.isComparing ? state.imgOrig : state.imgProc;
        ctx.fillStyle = 'white'; ctx.fillRect(0,0,cvs.width,cvs.height);
        
        const dw = (cvs.width * state.size / 100) * scale;
        const dh = (source.height * (dw / source.width));
        
        const sx = (cvs.width * totalC - dw)/2 - (c * (cvs.width - state.overlap)) + (state.offX * scale);
        const sy = (cvs.height * totalR - dh)/2 - (r * (cvs.height - state.overlap)) + (state.offY * scale);
        
        ctx.drawImage(source, sx, sy, dw, dh);
    }

    function openExport() {
        const gal = document.getElementById('exportGallery'); gal.innerHTML = '';
        const config = getGrid();
        for(let i=0; i < (config.r * config.c); i++) {
            const cvs = document.createElement('canvas');
            cvs.width = A4_W; cvs.height = A4_H;
            drawPage(cvs, Math.floor(i/config.c), i%config.c, 1, config.r, config.c);
            const dataUrl = cvs.toDataURL('image/png');
            const card = document.createElement|div');
            card.style.background='#4A3A35'; 
            card.style.padding='10px'; 
            card.style.borderRadius='8px';
            card.style.color= 'var(--text-light)';
            card.innerHTML = `<img src="${dataUrl}" style="width:100%; border:none; display:block;"><button class="m-btn save" style="width:100%; margin-top:10px;" onclick="download('${dataUrl}', ${i+1})">SAUVEGARDER PAGE ${i+1}</button>`;
            gal.appendChild(card);
        }
        document.getElementById('exportModal').classList.add('visible');
    }

    function closeExport() { document.getElementById('exportModal').classList.remove('visible'); }
    function download(url, n) { const a = document.createElement('a'); a.href = url; a.download = `Ozer_Stencil_P${n}.png`; a.click(); }
</script>
</body>
</html>
