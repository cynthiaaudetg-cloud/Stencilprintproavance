<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRO MASTERS - v16 OZER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --panel-bg: #16161a;
            --accent-pink: #ff007f; --accent-cyan: #00e5ff;
            --accent-green: #39ff14; --border-glow: #2d2d35;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg-deep); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: black; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-pink); }
        .maman-sokal { color: var(--accent-pink); font-size: 0.9rem; font-weight: bold; }
        
        /* ACTIONS */
        .top-actions { display: flex; gap: 10px; padding: 10px; background: var(--bg-deep); }
        .btn-main { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-import { background: var(--accent-cyan); color: black; }
        .btn-export { background: var(--accent-green); color: black; }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }
        
        /* GRILLE DE CONTRÔLE */
        .controls-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--panel-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border-glow); display: flex; flex-direction: column; gap: 4px; }
        .card-full { grid-column: span 2; }
        
        label { font-size: 0.6rem; color: var(--accent-cyan); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .val-display { float: right; color: white; font-family: 'Oswald'; font-size: 0.8rem; }
        
        /* BOUTONS +/- */
        .adj-group { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .btn-step { width: 42px; height: 42px; background: black; border: 1px solid var(--accent-pink); color: white; border-radius: 6px; font-weight: bold; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-step:active { background: var(--accent-pink); }
        
        input[type=range] { flex: 1; accent-color: var(--accent-pink); height: 20px; }
        select { background: black; color: white; border: 1px solid var(--accent-pink); padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; appearance: none; }
        
        .toggle-row { display: flex; gap: 4px; margin-top: 4px; }
        .tgl-btn { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--accent-pink); color: white; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .tgl-btn.active { background: var(--accent-pink); box-shadow: 0 0 10px var(--accent-pink); }

        /* VISUALISATION */
        .workspace { background: #000; flex: 1.2; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; border-top: 1px solid #222; }
        .grid-container { display: grid; gap: 15px; }
        canvas.preview { background: white; width: 100%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.8); border: 1px solid #333; }
        
        /* EXPORT */
        #modal { display: none; position: fixed; inset:0; background: black; z-index: 100; flex-direction: column; }
        #modal.open { display: flex; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; font-size:1.2rem; letter-spacing:1px;">STENCIL PRINT PRO OZER</h1>
    <div class="maman-sokal">Maman Sokal 🖤</div>
</header>

<div class="top-actions">
    <label class="btn-main btn-import" for="f">✦ CHARGER DESSIN</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-main btn-export" id="eBtn" disabled onclick="openExp()">PRÉPARER IMPRESSION</button>
</div>

<div class="controls-grid">
    <div class="card card-full">
        <label>MODE THERMIQUE OZER</label>
        <select id="selMode" onchange="proc()">
            <option value="stencil">STENCIL (LIGNES LIVRE COLORIER)</option>
            <option value="dot">DOTWORK (POINTS SERRÉS/ESPACÉS)</option>
            <option value="flash">FLASH (CONTRASTE MAXIMUM)</option>
            <option value="real">RÉALISME (DÉGRADÉS DE GRIS)</option>
        </select>
    </div>

    <div class="card">
        <label>ORIENTATION PAPIER</label>
        <div class="toggle-row">
            <button class="tgl-btn active" id="oriP" onclick="setOri('P')">PORTRAIT</button>
            <button class="tgl-btn" id="oriL" onclick="setOri('L')">PAYSAGE</button>
        </div>
    </div>

    <div class="card">
        <label>GABARIT PAGES A4</label>
        <select id="sPgs" onchange="setG(this.value)">
            <option value="1">1 Page (Standard)</option>
            <option value="2">2 Pages (Vertical)</option>
            <option value="4">4 Pages (Grand)</option>
            <option value="6">6 Pages (XL)</option>
            <option value="9">9 Pages (Poster)</option>
            <option value="12">12 Pages (Full Back)</option>
        </select>
    </div>

    <div class="card">
        <label>INTENSITÉ DU NOIR <span class="val-display" id="vI">128</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sT',-10)">-</button>
            <input type="range" id="sT" min="5" max="250" value="128" oninput="proc()">
            <button class="btn-step" onclick="adj('sT',10)">+</button>
        </div>
    </div>

    <div class="card">
        <label>DENSITÉ DOTS <span class="val-display" id="vDens">30%</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sDens',-5)">-</button>
            <input type="range" id="sDens" min="5" max="95" value="30" oninput="proc()">
            <button class="btn-step" onclick="adj('sDens',5)">+</button>
        </div>
    </div>

    <div class="card">
        <label>PRÉCISION LIGNES <span class="val-display" id="vN">0</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sN',-1)">-</button>
            <input type="range" id="sN" min="0" max="20" value="0" step="1" oninput="proc()">
            <button class="btn-step" onclick="adj('sN',1)">+</button>
        </div>
    </div>

    <div class="card">
        <label>LUMINOSITÉ <span class="val-display" id="vB">100%</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sB',-10)">-</button>
            <input type="range" id="sB" min="20" max="200" value="100" oninput="proc()">
            <button class="btn-step" onclick="adj('sB',10)">+</button>
        </div>
    </div>

    <div class="card">
        <label>TAILLE FINALE (%) <span class="val-display" id="vS">100%</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sS',-5)">-</button>
            <input type="range" id="sS" min="10" max="800" value="100" oninput="up()">
            <button class="btn-step" onclick="adj('sS',5)">+</button>
        </div>
    </div>
    
    <div class="card">
        <label>OVERLAP (COLLAGE) <span class="val-display" id="vO">20px</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sO',-5)">-</button>
            <input type="range" id="sO" min="0" max="150" value="20" oninput="up()">
            <button class="btn-step" onclick="adj('sO',5)">+</button>
        </div>
    </div>
</div>

<div class="workspace"><div id="grid" class="grid-container"></div></div>

<div id="modal">
    <header><h1>IMPRESSION OZER</h1><button onclick="document.getElementById('modal').className=''" style="color:var(--accent-pink); font-weight:bold; background:none; border:none; cursor:pointer; font-size:1rem;">X FERMER</button></header>
    <div id="gal" style="flex:1; overflow:auto; padding:20px; display:grid; gap:30px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));"></div>
</div>

<script>
    let A4W = 805, A4H = 1152; // Ratio A4 @ ~96dpi
    let st = { img: null, res: null, sz: 100, p: 1, ov: 20, ori: 'P' };

    function adj(id, d) {
        let e = document.getElementById(id); 
        let v = parseFloat(e.value) + d;
        if(v >= e.min && v <= e.max) { e.value = v; if(id === 'sS' || id === 'sO') up(); else proc(); }
    }

    document.getElementById('f').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            const i = new Image();
            i.onload = () => { st.img = i; document.getElementById('eBtn').disabled = false; proc(); };
            i.src = ev.target.result;
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function setOri(o) {
        st.ori = o; A4W = (o === 'P') ? 805 : 1152; A4H = (o === 'P') ? 1152 : 805;
        document.getElementById('oriP').classList.toggle('active', o === 'P');
        document.getElementById('oriL').classList.toggle('active', o === 'L');
        up();
    }

    function proc() {
        if(!st.img) return;
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height;
        const x = c.getContext('2d', {willReadFrequently: true});
        
        const n = parseFloat(document.getElementById('sN').value);
        const b = document.getElementById('sB').value;
        const t = document.getElementById('sT').value;
        const d_val = document.getElementById('sDens').value / 100;
        const mode = document.getElementById('selMode').value;
        
        document.getElementById('vN').innerText = n;
        document.getElementById('vB').innerText = b + '%';
        document.getElementById('vI').innerText = t;
        document.getElementById('vDens').innerText = Math.round(d_val*100) + '%';

        // Filtre de base haute précision
        x.filter = `grayscale(100%) brightness(${b}%) contrast(${120 + n*10}%)`;
        x.drawImage(st.img, 0, 0);
        
        let d = x.getImageData(0,0,c.width,c.height);
        let px = d.data;

        if(mode === 'dot') {
            for(let i=0; i<px.length; i+=4) {
                if(px[i] < t) {
                    let prob = (1 - (px[i]/255)) * d_val; 
                    let v = (Math.random() < prob) ? 0 : 255;
                    px[i] = px[i+1] = px[i+2] = v;
                } else { px[i] = px[i+1] = px[i+2] = 255; }
            }
            x.putImageData(d, 0, 0);
        } else if(mode === 'stencil' || mode === 'flash') {
            for(let i=0; i<px.length; i+=4) {
                let v = (px[i] > t) ? 255 : 0;
                px[i] = px[i+1] = px[i+2] = v;
            }
            x.putImageData(d, 0, 0);
            if(mode === 'stencil') {
                const iD = x.getImageData(0,0,c.width,c.height).data;
                const oD = x.createImageData(c.width,c.height);
                for (let y = 1; y < c.height-1; y++) {
                    for (let xPos = 1; xPos < c.width-1; xPos++) {
                        const i = (y * c.width + xPos) * 4;
                        const df = Math.abs(iD[i] - iD[i+4]) + Math.abs(iD[i] - iD[i + c.width*4]);
                        const v = (df > 35) ? 0 : 255;
                        oD.data[i] = oD.data[i+1] = oD.data[i+2] = v; oD.data[i+3] = 255;
                    }
                }
                x.putImageData(oD, 0, 0);
            }
        }
        const r = new Image(); r.onload = () => { st.res = r; up(); }; r.src = c.toDataURL();
    }

    function setG(n) { st.p = parseInt(n); up(); }
    function up() {
        st.sz = document.getElementById('sS').value;
        st.ov = parseInt(document.getElementById('sO').value);
        document.getElementById('vS').innerText = st.sz + '%';
        document.getElementById('vO').innerText = st.ov + 'px';
        render();
    }

    function render() {
        if(!st.res) return;
        const g = document.getElementById('grid'); g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;
        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W; c.height = A4H; c.className = 'preview';
            draw(c, Math.floor(i/cfg[1]), i%cfg[1], cfg[0], cfg[1]);
            g.appendChild(c);
        }
    }

    function draw(c, row, col, tR, tC) {
        const x = c.getContext('2d'); x.fillStyle = 'white'; x.fillRect(0,0,A4W,A4H);
        const w = (A4W * st.sz / 100); const h = (st.res.height * (w / st.res.width));
        const sx = (A4W * tC - w)/2 - (col * (A4W - st.ov));
        const sy = (A4H * tR - h)/2 - (row * (A4H - st.ov));
        x.drawImage(st.res, sx, sy, w, h);
    }

    function openExp() {
        const gal = document.getElementById('gal'); gal.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W * 2; c.height = A4H * 2; // HD pour Ozer
            const x = c.getContext('2d'); x.scale(2,2); 
            draw(c, Math.floor(i/cfg[1]), i%cfg[1], cfg[0], cfg[1]);
            const url = c.toDataURL('image/png');
            const d = document.createElement('div');
            d.innerHTML = `<img src="${url}" style="width:100%; border:1px solid #ff007f;"><button class="btn-main btn-export" style="width:100%; margin-top:10px" onclick="dl('${url}', ${i+1})">SAUVEGARDER PAGE ${i+1}</button>`;
            gal.appendChild(d);
        }
        document.getElementById('modal').className = 'open';
    }
    function dl(u, n) { const a = document.createElement('a'); a.href = u; a.download = `Sokal_Ozer_P${n}.png`; a.click(); }
</script>
</body>
</html>
