<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO v46 - Maman Sokal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #000; padding: 10px 15px; border-bottom: 2px solid var(--pink); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .top-bar { display: flex; gap: 8px; padding: 10px; flex-shrink: 0; }
        .btn-top { flex: 1; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; text-align: center; }
        .btn-load { background: var(--cyan); color: #000; }
        .btn-prep { background: var(--green); color: #000; }
        .btn-clear { background: var(--red); color: white; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 10px; overflow-y: auto; max-height: 55vh; flex-shrink: 0; border-bottom: 1px solid #333; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.65rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 1rem; }
        
        .adj { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .b-step { width: 40px; height: 40px; background: #000; border: 2px solid var(--pink); color: white; border-radius: 8px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        input[type=range] { flex: 1; accent-color: var(--pink); height: 30px; cursor: pointer; }
        select { background: #000; color: white; border: 2px solid var(--pink); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1rem; text-transform: uppercase; }

        .viewer { background: #050505; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 10px 0 100px 0; }
        .grid-view { display: grid; gap: 15px; width: 95%; justify-items: center; }
        .page-output { background: white; width: 100%; border: 1px solid #ddd; }

        #printZone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 20px; }
        .close-btn { position: sticky; top: 10px; background: var(--pink); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; z-index: 1001; font-size: 1.1rem; text-transform: uppercase; }
        
        .overload-msg { display: none; color: var(--red); font-weight: bold; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; font-size:1.1rem;">STENCIL PRINT PRO v46</h1>
    <div style="color:var(--pink); font-size:0.75rem; font-weight:bold;">MAMAN SOKAL 🖤</div>
</header>

<div class="top-bar">
    <label class="btn-top btn-load" for="f">✦ IMAGE</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-top btn-clear" onclick="resetAll()">✖ EFFACER</button>
    <button class="btn-top btn-prep" id="pBtn" disabled onclick="openPrintZone()">IMPRIMER A4</button>
</div>

<div class="controls">
    <div class="card card-full">
        <label>MODE DE RENDU</label>
        <select id="mde" onchange="proc()">
            <option value="orig">PHOTO ORIGINALE (AJUSTABLE)</option>
            <option value="stencil" selected>STENCIL (LIGNES NETTES)</option>
            <option value="dotwork">DOTWORK (POINTILLISME RÉALISTE)</option>
        </select>
    </div>

    <div class="card"><label>LUMINOSITÉ <span class="val" id="vL">100</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sL',-5)">-</button><input type="range" id="sL" min="50" max="150" value="100" oninput="proc()"><button class="b-step" onclick="ch('sL',10)">+</button></div>
    </div>
    <div class="card"><label>CONTRASTE <span class="val" id="vC">100</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sC',-5)">-</button><input type="range" id="sC" min="50" max="200" value="100" oninput="proc()"><button class="b-step" onclick="ch('sC',5)">+</button></div>
    </div>
    
    <div class="card"><label>NETTETÉ IMAGE <span class="val" id="vN">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sN',-1)">-</button><input type="range" id="sN" min="0" max="30" value="0" oninput="proc()"><button class="b-step" onclick="ch('sN',1)">+</button></div>
    </div>
    <div class="card"><label>NETTETÉ LIGNES <span class="val" id="vNL">5</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sNL',-1)">-</button><input type="range" id="sNL" min="1" max="15" value="5" oninput="proc()"><button class="b-step" onclick="ch('sNL',1)">+</button></div>
    </div>

    <div class="card"><label>INTENSITÉ NOIR <span class="val" id="vI">128</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sT',-10)">-</button><input type="range" id="sT" min="10" max="250" value="128" oninput="proc()"><button class="b-step" onclick="ch('sT',10)">+</button></div>
    </div>
    <div class="card"><label>ÉPAISSEUR LIGNES <span class="val" id="vE">1</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sE',-1)">-</button><input type="range" id="sE" min="1" max="5" value="1" oninput="proc()"><button class="b-step" onclick="ch('sE',1)">+</button></div>
    </div>
    
    <div class="card card-full"><label style="color:var(--green)">POINTILLISME : RÉGLAGES DÉTAILS</label>
        <div class="adj"><label>Max Dot Density <span class="val" id="vD">100%</span></label></div>
        <div class="adj"><button class="b-step" onclick="ch('sD',-5)">-</button><input type="range" id="sD" min="10" max="100" value="100" oninput="proc()"><button class="b-step" onclick="ch('sD',5)">+</button></div>
        <div class="adj"><label>Min Dot Size <span class="val" id="vDE">1</span></label></div>
        <div class="adj"><button class="b-step" onclick="ch('sDE',-1)">-</button><input type="range" id="sDE" min="1" max="10" value="1" oninput="proc()"><button class="b-step" onclick="ch('sDE',1)">+</button></div>
    </div>

    <div class="card card-full card-select"><label>GABARIT PAGES A4 (DÉCOUPE)</label>
        <select id="pgs" onchange="setG(this.value)">
            <option value="1">1 Page</option>
            <option value="2">2 Pages</option>
            <option value="4">4 Pages</option>
            <option value="6">6 Pages</option>
            <option value="9">9 Pages</option>
            <option value="12">12 Pages</option>
        </select>
        <p id="overloadMsg" class="overload-msg">Avertissement: Risque d'erreur d'impression (trop de pages).</p>
    </div>

    <div class="card card-full"><label>AJUSTEMENT TAILLE GABARIT (%) <span class="val" id="vS">100%</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sS',-10)">-</button><input type="range" id="sS" min="10" max="600" value="100" oninput="up()"><button class="b-step" onclick="ch('sS',10)">+</button></div>
    </div>
</div>

<div class="viewer"><div id="gv" class="grid-view"></div></div>

<div id="printZone">
    <button class="close-btn" onclick="closePrintZone()">✖ RETOUR RÉGLAGES</button>
    <div id="printContainer"></div>
</div>

<script>
    let A4W = 805, A4H = 1152; 
    let st = { img: null, res: null, p: 1, sz: 100 };

    function ch(id, d) { 
        let e = document.getElementById(id); let v = parseFloat(e.value) + d; 
        if(v >= e.min && v <= e.max) { e.value = v; if(id==='sS') up(); else proc(); } 
    }

    function resetAll() {
        ['sN','sNL','sL','sC','sT','sE','sS','sD','sDE'].forEach(id => {
            let val = (id==='sL'||id==='sC'||id==='sS'||id==='sD')?100:(id==='sT')?128:(id==='sNL')?5:(id==='sE'||id==='sDE')?1:0;
            document.getElementById(id).value = val;
        });
        document.getElementById('mde').value = 'stencil';
        document.getElementById('overloadMsg').style.display = 'none';
        up(); proc();
    }

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader(); 
        r.onload = (ev) => {
            const i = new Image(); 
            i.onload = () => { st.img = i; document.getElementById('pBtn').disabled = false; proc(); }; 
            i.src = ev.target.result;
        }; r.readAsDataURL(file);
    };

    function proc() {
        if(!st.img) return; 
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height; 
        const x = c.getContext('2d');
        const mode = document.getElementById('mde').value;
        const n = parseInt(document.getElementById('sN').value);
        const nl = parseInt(document.getElementById('sNL').value);
        const l = parseInt(document.getElementById('sL').value);
        const ct = parseInt(document.getElementById('sC').value);
        const t = parseInt(document.getElementById('sT').value);
        const thick = parseInt(document.getElementById('sE').value);
        const dens = parseInt(document.getElementById('sD').value);
        const dE = parseInt(document.getElementById('sDE').value);

        ['vN','vNL','vL','vC','vI','vE','vD','vDE'].forEach(vId => {
            document.getElementById(vId).innerText = document.getElementById(vId.replace('v', 's')).value + (vId === 'vD' ? '%' : '');
        });

        x.filter = `brightness(${l}%) contrast(${ct}%) grayscale(${mode==='orig'?0:100}%)`;
        x.drawImage(st.img, 0, 0);
        
        if(n > 0) { 
            x.globalCompositeOperation = 'overlay';
            x.filter = `contrast(${100 + n * 4}%)`;
            x.drawImage(c, 0, 0);
            x.globalCompositeOperation = 'source-over';
        }

        if (mode !== 'orig') {
            let idat = x.getImageData(0,0,c.width,c.height);
            let px = idat.data;
            let outat = x.createImageData(c.width, c.height);
            let out = outat.data;
            for (let i = 0; i < out.length; i += 4) { out[i]=out[i+1]=out[i+2]=255; out[i+3]=255; }
            
            if(mode === 'stencil') {
                let w = c.width;
                for(let i=0; i<px.length; i+=4) {
                    let v = px[i];
                    let r = px[i+4] || v;
                    let d = px[i + w*4] || v;
                    let diff = Math.abs(v - r) + Math.abs(v - d);
                    if(diff > (255-t)/(nl/2)) {
                        for(let ty=-thick+1; ty<thick; ty++) {
                            for(let tx=-thick+1; tx<thick; tx++) {
                                let oIdx = i + (ty * w * 4) + (tx * 4);
                                if(oIdx >= 0 && oIdx < out.length) { out[oIdx]=out[oIdx+1]=out[oIdx+2]=0; }
                            }
                        }
                    }
                }
            } else if (mode === 'dotwork') {
                // Algorithme de Pointillisme Pro (Diffusion stochastique par erreur)
                // Cet algorithme est meilleur pour restituer les gradients de gris
                const w = c.width;
                const h = c.height;
                const thresh = 255 - t; // Intensité Noir
                const maxD = dens / 100; // Densité max
                const minS = Math.max(1, dE); // Taille min
                
                // On copie l'image grise d'origine
                let graypx = new Float32Array(px.length/4);
                for(let i=0; i<graypx.length; i++) {
                    graypx[i] = px[i*4];
                }

                for(let y=0; y<h; y++) {
                    for(let x_pos=0; x_pos<w; x_pos++) {
                        let i = y*w + x_pos;
                        let oldVal = graypx[i];
                        // Seuil simple avec bruit aléatoire
                        let newVal = (oldVal < (thresh + (Math.random()*60 - 30))) ? 0 : 255;
                        
                        if(newVal === 0) {
                            // On dessine le point noir (taille proportionnelle à la densité)
                            // Utilisation de dE (Min Dot Size)
                            let pSize = minS + (Math.random()*maxD*2 - maxD); 
                            drawDot(out, w, h, x_pos, y, pSize);
                        }
                    }
                }
            }
            x.putImageData(outat, 0, 0);
        }
        const r = new Image(); r.onload = () => { st.res = r; render(); }; r.src = c.toDataURL();
    }
    
    // Fonction d'aide pour dessiner un point plein
    function drawDot(out, w, h, cx, cy, size) {
        for(let dy=-size/2; dy<size/2; dy++) {
            for(let dx=-size/2; dx<size/2; dx++) {
                let nx = Math.round(cx + dx);
                let ny = Math.round(cy + dy);
                if(nx>=0 && nx<w && ny>=0 && ny<h) {
                    let oIdx = (ny*w + nx)*4;
                    out[oIdx]=out[oIdx+1]=out[oIdx+2]=0;
                }
            }
        }
    }

    function setG(v) { 
        st.p = parseInt(v); 
        document.getElementById('overloadMsg').style.display = (v === '12' ? 'block' : 'none');
        render(); 
    }
    function up() { st.sz = document.getElementById('sS').value; document.getElementById('vS').innerText = st.sz+'%'; render(); }

    function render() {
        if(!st.res) return; 
        const g = document.getElementById('gv'); g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;

        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W; c.height = A4H; 
            const x = c.getContext('2d');
            x.fillStyle = 'white'; x.fillRect(0,0,A4W,A4H);
            const totalW = A4W * cfg[1];
            const w = (totalW * st.sz / 100);
            const h = st.res.height * (w / st.res.width);
            const sx = (totalW - w)/2 - ((i%cfg[1]) * A4W);
            const sy = (A4H * cfg[0] - h)/2 - (Math.floor(i/cfg[1]) * A4H);
            x.drawImage(st.res, sx, sy, w, h);
            const imgOut = new Image(); imgOut.src = c.toDataURL(); imgOut.className = "page-output";
            g.appendChild(imgOut);
        }
    }

    function openPrintZone() {
        const zone = document.getElementById('printZone');
        const container = document.getElementById('printContainer');
        container.innerHTML = '';
        document.querySelectorAll('.page-output').forEach((img, idx) => {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<label style="color:white;display:block;text-align:center;margin:20px 0 10px;font-family:'Oswald';text-transform:uppercase;">PAGE A4 [${idx+1}]</label>`;
            const nImg = new Image(); nImg.src = img.src; nImg.style.width = "90vw"; nImg.style.border = "1px solid white";
            wrap.appendChild(nImg); container.appendChild(wrap);
        });
        zone.style.display = 'block';
    }
    function closePrintZone() { document.getElementById('printZone').style.display = 'none'; }
</script>
</body>
</html>
