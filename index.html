<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO v23 - Maman Sokal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: default; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--pink); }
        .top-bar { display: flex; gap: 8px; padding: 10px; }
        .btn-top { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; text-align: center; }
        .btn-load { background: var(--cyan); color: #000; }
        .btn-print { background: var(--green); color: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 10px 10px; overflow-y: auto; max-height: 55vh; }
        .card { background: var(--card); padding: 8px; border-radius: 8px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.6rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 4px; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 0.8rem; }
        .adj { display: flex; align-items: center; gap: 6px; }
        .b-step { width: 34px; height: 34px; background: #000; border: 1px solid var(--pink); color: white; border-radius: 6px; font-size: 1.2rem; cursor: pointer; }
        input[type=range] { flex: 1; accent-color: var(--pink); height: 15px; }
        select { background: #000; color: white; border: 1px solid var(--pink); padding: 8px; border-radius: 6px; width: 100%; font-size: 0.8rem; }
        .viewer { background: #111; flex: 1; overflow-y: auto; border-top: 1px solid #333; padding: 15px 0 40px; }
        .grid-view { display: grid; gap: 20px; padding: 10px; width: 100%; justify-items: center; }
        canvas { background: white; width: 90%; max-width: 350px; height: auto; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tgl-group { display: flex; gap: 5px; }
        .tgl-btn { flex: 1; padding: 10px; background: #000; border: 1px solid var(--pink); color: white; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .tgl-btn.active { background: var(--pink); color: white; }
    </style>
</head>
<body>
<header>
    <h1 style="font-family:'Oswald'; font-size:1.1rem; letter-spacing:1px;">STENCIL PRINT PRO v23</h1>
    <div style="color:var(--pink); font-size:0.8rem; font-weight:bold;">Maman Sokal 🖤</div>
</header>

<div class="top-bar">
    <label class="btn-top btn-load" for="f">✦ CHARGER DESSIN</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-top btn-print" id="pBtn" disabled onclick="window.print()">IMPRIMER TOUT</button>
</div>

<div class="controls">
    <div class="card card-full"><label>GABARIT A4 (DÉCOUPAGE)</label>
        <select id="pgs" onchange="setG(this.value)">
            <option value="1">1 Page (A4 Standard)</option>
            <option value="2">2 Pages (1x2)</option>
            <option value="4">4 Pages (2x2)</option>
            <option value="6">6 Pages (2x3)</option>
            <option value="9">9 Pages (3x3)</option>
            <option value="12">12 Pages (4x3)</option>
        </select>
    </div>
    <div class="card"><label>ORIENTATION</label>
        <div class="tgl-group">
            <button class="tgl-btn active" id="oP" onclick="setO('P')">PORTRAIT</button>
            <button class="tgl-btn" id="oL" onclick="setO('L')">PAYSAGE</button>
        </div>
    </div>
    <div class="card"><label>ACCENTUER DÉTAILS <span class="val" id="vD">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sD',-1)">-</button><input type="range" id="sD" min="0" max="20" value="0" oninput="proc()"><button class="b-step" onclick="ch('sD',1)">+</button></div>
    </div>
    <div class="card"><label>NETTETÉ LIGNES <span class="val" id="vN">10</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sN',-1)">-</button><input type="range" id="sN" min="0" max="30" value="10" oninput="proc()"><button class="b-step" onclick="ch('sN',1)">+</button></div>
    </div>
    <div class="card"><label>CONTRASTE <span class="val" id="vC">128</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sC',-5)">-</button><input type="range" id="sC" min="0" max="255" value="128" oninput="proc()"><button class="b-step" onclick="ch('sC',5)">+</button></div>
    </div>
    <div class="card"><label>CHAUFFE (NOIR) <span class="val" id="vI">150</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sT',-10)">-</button><input type="range" id="sT" min="10" max="250" value="150" oninput="proc()"><button class="b-step" onclick="ch('sT',10)">+</button></div>
    </div>
    <div class="card"><label>LUMINOSITÉ <span class="val" id="vB">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sB',-5)">-</button><input type="range" id="sB" min="-100" max="100" value="0" oninput="proc()"><button class="b-step" onclick="ch('sB',5)">+</button></div>
    </div>
    <div class="card"><label>TAILLE IMAGE <span class="val" id="vS">100%</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sS',-5)">-</button><input type="range" id="sS" min="10" max="500" value="100" oninput="up()"><button class="b-step" onclick="ch('sS',5)">+</button></div>
    </div>
</div>

<div class="viewer">
    <div style="text-align:center; font-size:0.6rem; color:#666; margin-bottom:10px;">Appui long sur une page pour l'enregistrer</div>
    <div id="gv" class="grid-view"></div>
</div>

<script>
    let A4W = 805, A4H = 1152; 
    let st = { img: null, res: null, p: 1, sz: 100, ori: 'P' };

    function ch(id, d) { 
        let e = document.getElementById(id); 
        let v = parseInt(e.value) + d; 
        if(v >= e.min && v <= e.max) { 
            e.value = v; 
            if(id==='sS') up(); else proc(); 
        } 
    }

    function setO(o) { 
        st.ori = o; 
        A4W = (o === 'P') ? 805 : 1152; 
        A4H = (o === 'P') ? 1152 : 805; 
        document.getElementById('oP').classList.toggle('active', o === 'P'); 
        document.getElementById('oL').classList.toggle('active', o === 'L'); 
        render(); 
    }

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader(); 
        r.onload = (ev) => {
            const i = new Image(); 
            i.onload = () => { 
                st.img = i; 
                document.getElementById('pBtn').disabled = false; 
                proc(); 
            }; 
            i.src = ev.target.result;
        }; 
        r.readAsDataURL(file);
    };

    function proc() {
        if(!st.img) return; 
        const c = document.createElement('canvas'); 
        c.width = st.img.width; 
        c.height = st.img.height; 
        const x = c.getContext('2d');
        
        const n = document.getElementById('sN').value;
        const b = document.getElementById('sB').value;
        const t = document.getElementById('sT').value;
        const ct = document.getElementById('sC').value;
        const det = document.getElementById('sD').value;

        document.getElementById('vN').innerText = n; 
        document.getElementById('vB').innerText = b; 
        document.getElementById('vI').innerText = t; 
        document.getElementById('vC').innerText = ct; 
        document.getElementById('vD').innerText = det;

        // Étape 1: Filtres de base
        x.filter = `grayscale(100%) brightness(${100+parseInt(b)}%) contrast(${ct}%)`;
        x.drawImage(st.img, 0, 0);

        // Étape 2: Accentuation si demandée
        if(det > 0) {
            x.filter = `contrast(${100 + det * 15}%) brightness(105%)`;
            x.drawImage(c, 0, 0);
        }

        // Étape 3: Seuil pour le Stencil (Chauffe)
        let idat = x.getImageData(0,0,c.width,c.height);
        let px = idat.data;
        for(let i=0; i<px.length; i+=4) { 
            let v = (px[i] > (255-t)) ? 255 : 0; 
            px[i]=px[i+1]=px[i+2]=v; 
        } 
        x.putImageData(idat, 0, 0);

        const r = new Image(); 
        r.onload = () => { st.res = r; render(); }; 
        r.src = c.toDataURL();
    }

    function setG(v) { st.p = parseInt(v); render(); }
    function up() { st.sz = document.getElementById('sS').value; document.getElementById('vS').innerText = st.sz+'%'; render(); }

    function render() {
        if(!st.res) return; 
        const g = document.getElementById('gv'); 
        g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;

        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); 
            c.width = A4W; 
            c.height = A4H; 
            const x = c.getContext('2d');
            x.fillStyle = 'white'; 
            x.fillRect(0,0,A4W,A4H);

            const w = (A4W * cfg[1] * st.sz / 100);
            const h = st.res.height * (w / st.res.width);

            // Centrage global sur l'ensemble des pages
            const sx = (A4W * cfg[1] - w)/2 - ((i%cfg[1]) * A4W);
            const sy = (A4H * cfg[0] - h)/2 - (Math.floor(i/cfg[1]) * A4H);

            x.drawImage(st.res, sx, sy, w, h);
            g.appendChild(c);
        }
    }
</script>
</body>
</html>
