<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO - v17 OZER PRESTIGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --panel-bg: #16161a;
            --accent-pink: #ff007f; --accent-cyan: #00e5ff;
            --accent-green: #39ff14; --border-glow: #2d2d35;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg-deep); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: black; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-pink); }
        .maman-sokal { color: var(--accent-pink); font-size: 0.9rem; font-weight: bold; }
        
        .top-actions { display: flex; gap: 10px; padding: 10px; }
        .btn-main { flex: 1; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .btn-import { background: var(--accent-cyan); color: black; }
        .btn-export { background: var(--accent-green); color: black; }
        
        .controls-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--panel-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border-glow); display: flex; flex-direction: column; gap: 6px; }
        .card-full { grid-column: span 2; }
        
        label { font-size: 0.65rem; color: var(--accent-cyan); font-weight: bold; text-transform: uppercase; }
        .val-display { float: right; color: white; font-family: 'Oswald'; font-size: 0.9rem; }
        
        .adj-group { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .btn-step { width: 45px; height: 45px; background: black; border: 2px solid var(--accent-pink); color: white; border-radius: 8px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }
        .btn-step:active { background: var(--accent-pink); }
        
        input[type=range] { flex: 1; accent-color: var(--accent-pink); }
        select { background: black; color: white; border: 1px solid var(--accent-pink); padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; }
        
        .workspace { background: #000; flex: 1.5; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; border-top: 1px solid #333; }
        .grid-container { display: grid; gap: 15px; }
        canvas.preview { background: white; width: 100%; height: auto; box-shadow: 0 0 25px rgba(0,0,0,0.9); }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; letter-spacing:1px;">STENCIL PRINT PRO OZER</h1>
    <div class="maman-sokal">Maman Sokal 🖤</div>
</header>

<div class="top-actions">
    <label class="btn-main btn-import" for="f">✦ CHARGER DESSIN</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-main btn-export" id="eBtn" disabled onclick="openExp()">PRÉPARER IMPRESSION</button>
</div>

<div class="controls-grid">
    <div class="card card-full">
        <label>MODE THERMIQUE</label>
        <select id="selMode" onchange="proc()">
            <option value="stencil">STENCIL (LIGNES NETTES)</option>
            <option value="dot">DOTWORK POINTILLISME</option>
            <option value="flash">FLASH NOIR TOTAL</option>
        </select>
    </div>

    <div class="card">
        <label>NETTETÉ LIGNES <span class="val-display" id="vN">10</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sN',-1)">-</button>
            <input type="range" id="sN" min="0" max="30" value="10" step="1" oninput="proc()">
            <button class="btn-step" onclick="adj('sN',1)">+</button>
        </div>
    </div>

    <div class="card">
        <label>LUMINOSITÉ (FOND) <span class="val-display" id="vB">0</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sB',-5)">-</button>
            <input type="range" id="sB" min="-100" max="100" value="0" oninput="proc()">
            <button class="btn-step" onclick="adj('sB',5)">+</button>
        </div>
    </div>

    <div class="card">
        <label>INTENSITÉ NOIR <span class="val-display" id="vI">150</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sT',-10)">-</button>
            <input type="range" id="sT" min="10" max="250" value="150" oninput="proc()">
            <button class="btn-step" onclick="adj('sT',10)">+</button>
        </div>
    </div>

    <div class="card">
        <label>DENSITÉ DOTS <span class="val-display" id="vDens">30%</span></label>
        <div class="adj-group">
            <button class="btn-step" onclick="adj('sDens',-5)">-</button>
            <input type="range" id="sDens" min="5" max="95" value="30" oninput="proc()">
            <button class="btn-step" onclick="adj('sDens',5)">+</button>
        </div>
    </div>

    <div class="card card-full">
        <label>TAILLE (%) & GABARIT</label>
        <div class="adj-group">
            <select id="sPgs" onchange="setG(this.value)" style="flex:1">
                <option value="1">1 Page</option>
                <option value="4">4 Pages (2x2)</option>
                <option value="9">9 Pages (3x3)</option>
                <option value="12">12 Pages (4x3)</option>
            </select>
            <button class="btn-step" onclick="adj('sS',-5)">-</button>
            <input type="range" id="sS" min="10" max="600" value="100" oninput="up()">
            <button class="btn-step" onclick="adj('sS',5)">+</button>
        </div>
    </div>
</div>

<div class="workspace"><div id="grid" class="grid-container"></div></div>

<script>
    let A4W = 805, A4H = 1152;
    let st = { img: null, res: null, sz: 100, p: 1, ov: 25 };

    function adj(id, d) {
        let e = document.getElementById(id); 
        let v = parseFloat(e.value) + d;
        if(v >= e.min && v <= e.max) { e.value = v; if(id === 'sS') up(); else proc(); }
    }

    document.getElementById('f').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            const i = new Image();
            i.onload = () => { st.img = i; document.getElementById('eBtn').disabled = false; proc(); };
            i.src = ev.target.result;
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function proc() {
        if(!st.img) return;
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height;
        const x = c.getContext('2d', {willReadFrequently: true});
        
        const net = parseFloat(document.getElementById('sN').value);
        const lum = document.getElementById('sB').value;
        const intensity = document.getElementById('sT').value;
        const mode = document.getElementById('selMode').value;
        
        document.getElementById('vN').innerText = net;
        document.getElementById('vB').innerText = lum;
        document.getElementById('vI').innerText = intensity;

        // Étape 1 : Nettoyage et contraste de base
        x.filter = `grayscale(100%) brightness(${100 + parseInt(lum)}%) contrast(${100 + net * 5}%)`;
        x.drawImage(st.img, 0, 0);
        
        let d = x.getImageData(0,0,c.width,c.height);
        let px = d.data;

        // Étape 2 : Traitement des lignes selon l'intensité
        if(mode === 'stencil') {
            for(let i=0; i<px.length; i+=4) {
                let v = (px[i] > (255 - intensity)) ? 255 : 0;
                px[i] = px[i+1] = px[i+2] = v;
            }
            x.putImageData(d, 0, 0);
            // Algorithme de contour pour la netteté Ozer
            const iD = x.getImageData(0,0,c.width,c.height).data;
            const oD = x.createImageData(c.width,c.height);
            for (let y = 1; y < c.height-1; y++) {
                for (let xP = 1; xP < c.width-1; xP++) {
                    const i = (y * c.width + xP) * 4;
                    const diff = Math.abs(iD[i] - iD[i+4]) + Math.abs(iD[i] - iD[i + c.width*4]);
                    const res = (diff > (40 - net)) ? 0 : 255;
                    oD.data[i] = oD.data[i+1] = oD.data[i+2] = res; oD.data[i+3] = 255;
                }
            }
            x.putImageData(oD, 0, 0);
        } else if(mode === 'dot') {
            const dens = document.getElementById('sDens').value / 100;
            for(let i=0; i<px.length; i+=4) {
                if(px[i] < (255-intensity)) {
                    let v = (Math.random() < ((1 - px[i]/255) * dens)) ? 0 : 255;
                    px[i] = px[i+1] = px[i+2] = v;
                } else { px[i] = px[i+1] = px[i+2] = 255; }
            }
            x.putImageData(d, 0, 0);
        }

        const r = new Image(); r.onload = () => { st.res = r; up(); }; r.src = c.toDataURL();
    }

    function setG(n) { st.p = parseInt(n); up(); }
    function up() {
        st.sz = document.getElementById('sS').value;
        render();
    }

    function render() {
        if(!st.res) return;
        const g = document.getElementById('grid'); g.innerHTML = '';
        const cfg = {1:[1,1], 4:[2,2], 9:[3,3], 12:[4,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;
        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W; c.height = A4H; c.className = 'preview';
            draw(c, Math.floor(i/cfg[1]), i%cfg[1], cfg[0], cfg[1]);
            g.appendChild(c);
        }
    }

    function draw(c, row, col, tR, tC) {
        const x = c.getContext('2d'); x.fillStyle = 'white'; x.fillRect(0,0,A4W,A4H);
        const w = (A4W * st.sz / 100); const h = (st.res.height * (w / st.res.width));
        const sx = (A4W * tC - w)/2 - (col * (A4W - st.ov));
        const sy = (A4H * tR - h)/2 - (row * (A4H - st.ov));
        x.drawImage(st.res, sx, sy, w, h);
    }
</script>
</body>
</html>
