<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STENCIL PRINT PRO v32 - Maman Sokal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 10px 15px; border-bottom: 2px solid var(--pink); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .top-bar { display: flex; gap: 8px; padding: 10px; flex-shrink: 0; }
        .btn-top { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; text-align: center; }
        .btn-load { background: var(--cyan); color: #000; }
        .btn-prep { background: var(--green); color: #000; }
        .btn-reset { background: var(--red); color: #fff; font-size: 0.7rem; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 10px 10px; overflow-y: auto; max-height: 52vh; flex-shrink: 0; border-bottom: 1px solid #333; }
        .card { background: var(--card); padding: 8px; border-radius: 8px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.6rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 0.8rem; }
        
        .adj { display: flex; align-items: center; gap: 6px; }
        .b-step { width: 34px; height: 34px; background: #000; border: 1px solid var(--pink); color: white; border-radius: 6px; font-size: 1.1rem; cursor: pointer; }
        input[type=range] { flex: 1; accent-color: var(--pink); }
        select { background: #000; color: white; border: 1px solid var(--pink); padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; }

        .joy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 110px; margin: 0 auto; }
        .btn-joy { background: #000; border: 1px solid var(--cyan); color: white; border-radius: 4px; padding: 8px; cursor: pointer; font-weight: bold; }

        .viewer { background: #050505; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 10px 0 120px 0; }
        .grid-view { display: grid; gap: 10px; width: 95%; justify-items: center; }
        .page-output { background: white; width: 100%; box-shadow: 0 0 10px rgba(255,0,127,0.2); }

        #printZone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 20px; }
        .close-btn { position: sticky; top: 10px; background: var(--pink); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 20px; z-index: 1001; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Oswald'; font-size:1rem;">STENCIL PRINT PRO v32</h1>
    <div style="color:var(--pink); font-size:0.7rem; font-weight:bold;">MAMAN SOKAL 🖤</div>
</header>

<div class="top-bar">
    <label class="btn-top btn-load" for="f">✦ CHARGER IMAGE</label>
    <input type="file" id="f" hidden accept="image/*">
    <button class="btn-top btn-reset" onclick="resetAll()">✖ EFFACER / RETOUR</button>
    <button class="btn-top btn-prep" id="pBtn" disabled onclick="openPrintZone()">PRÉPARER</button>
</div>

<div class="controls">
    <div class="card card-full">
        <label>MODE DE RENDU</label>
        <select id="mde" onchange="proc()">
            <option value="orig">IMAGE ORIGINALE (ÉDITABLE)</option>
            <option value="photo">RÉALISTE (N&B THERMIQUE)</option>
            <option value="dotwork">DOTWORK (POINTILLISME)</option>
            <option value="stencil">STENCIL (LIGNES NETTES)</option>
        </select>
    </div>

    <div class="card"><label>NETTETÉ <span class="val" id="vN">10</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sN',-1)">-</button><input type="range" id="sN" min="0" max="30" value="10" oninput="proc()"><button class="b-step" onclick="ch('sN',1)">+</button></div>
    </div>
    <div class="card"><label>CONTRASTE <span class="val" id="vC">128</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sC',-5)">-</button><input type="range" id="sC" min="0" max="255" value="128" oninput="proc()"><button class="b-step" onclick="ch('sC',5)">+</button></div>
    </div>
    <div class="card"><label>LUMINOSITÉ <span class="val" id="vB">0</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sB',-5)">-</button><input type="range" id="sB" min="-100" max="100" value="0" oninput="proc()"><button class="b-step" onclick="ch('sB',5)">+</button></div>
    </div>
    <div class="card"><label>INTENSITÉ (CHAUFFE) <span class="val" id="vI">150</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sT',-10)">-</button><input type="range" id="sT" min="10" max="250" value="150" oninput="proc()"><button class="b-step" onclick="ch('sT',10)">+</button></div>
    </div>

    <div class="card"><label>TAILLE (%) <span class="val" id="vS">100%</span></label>
        <div class="adj"><button class="b-step" onclick="ch('sS',-5)">-</button><input type="range" id="sS" min="10" max="400" value="100" oninput="up()"><button class="b-step" onclick="ch('sS',5)">+</button></div>
    </div>
    <div class="card"><label>DÉPLACER LE DESSIN</label>
        <div class="joy-grid">
            <div></div><button class="btn-joy" onclick="mov(0,-20)">↑</button><div></div>
            <button class="btn-joy" onclick="mov(-20,0)">←</button><button class="btn-joy" onclick="resetPos()">•</button><button class="btn-joy" onclick="mov(20,0)">→</button>
            <div></div><button class="btn-joy" onclick="mov(0,20)">↓</button><div></div>
        </div>
    </div>

    <div class="card card-full"><label>GABARIT A4</label>
        <select id="pgs" onchange="setG(this.value)">
            <option value="1">1 Page</option>
            <option value="2">2 Pages (1x2)</option>
            <option value="4">4 Pages (2x2)</option>
            <option value="6">6 Pages (2x3)</option>
            <option value="9">9 Pages (3x3)</option>
        </select>
    </div>
</div>

<div class="viewer"><div id="gv" class="grid-view"></div></div>

<div id="printZone">
    <button class="close-btn" onclick="closePrintZone()">✖ RETOUR AUX RÉGLAGES</button>
    <div id="printContainer" style="display:grid; gap:20px; justify-items:center;"></div>
</div>

<script>
    let A4W = 805, A4H = 1152; 
    let st = { img: null, res: null, p: 1, sz: 100, offX: 0, offY: 0 };

    function ch(id, d) { 
        let e = document.getElementById(id); let v = parseFloat(e.value) + d; 
        if(v >= e.min && v <= e.max) { e.value = v; if(id==='sS') up(); else proc(); } 
    }

    function mov(x, y) { st.offX += x; st.offY += y; render(); }
    function resetPos() { st.offX = 0; st.offY = 0; render(); }

    function resetAll() {
        document.getElementById('sN').value = 10;
        document.getElementById('sC').value = 128;
        document.getElementById('sB').value = 0;
        document.getElementById('sT').value = 150;
        document.getElementById('sS').value = 100;
        document.getElementById('mde').value = 'orig';
        resetPos();
        up();
        proc();
    }

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader(); 
        r.onload = (ev) => {
            const i = new Image(); 
            i.onload = () => { st.img = i; document.getElementById('pBtn').disabled = false; proc(); }; 
            i.src = ev.target.result;
        }; r.readAsDataURL(file);
    };

    function proc() {
        if(!st.img) return; 
        const c = document.createElement('canvas'); c.width = st.img.width; c.height = st.img.height; 
        const x = c.getContext('2d');
        const mode = document.getElementById('mde').value;
        const n = parseInt(document.getElementById('sN').value);
        const b = parseInt(document.getElementById('sB').value);
        const t = parseInt(document.getElementById('sT').value);
        const ct = parseInt(document.getElementById('sC').value);

        document.getElementById('vN').innerText = n; document.getElementById('vB').innerText = b; 
        document.getElementById('vI').innerText = t; document.getElementById('vC').innerText = ct;

        let filterStr = `brightness(${100+b}%) contrast(${ct}%)`;
        if (mode !== 'orig') filterStr = `grayscale(100%) ` + filterStr;
        
        x.filter = filterStr;
        x.drawImage(st.img, 0, 0);
        
        if(n > 5) { 
            x.globalCompositeOperation = 'overlay';
            x.filter = `contrast(${100 + n * 2}%)`;
            x.drawImage(c, 0, 0);
            x.globalCompositeOperation = 'source-over';
        }

        if (mode !== 'orig') {
            let idat = x.getImageData(0,0,c.width,c.height);
            let px = idat.data;
            let thresh = 255 - t;

            if (mode === 'dotwork') {
                for(let i=0; i<px.length; i+=4) {
                    let v = (px[i]+px[i+1]+px[i+2])/3;
                    let dot = (v + (Math.random()*70 - 35)); 
                    let res = (dot > thresh) ? 255 : 0;
                    px[i]=px[i+1]=px[i+2]=res;
                }
            } else if (mode === 'stencil') {
                let w = c.width;
                for(let i=0; i<px.length; i+=4) {
                    let v = px[i];
                    let r = px[i+4] || v;
                    let d = px[i + w*4] || v;
                    let edge = Math.abs(v - r) + Math.abs(v - d);
                    let res = (edge > (255-t)/5) ? 0 : 255;
                    px[i]=px[i+1]=px[i+2]=res;
                }
            } else {
                for(let i=0; i<px.length; i+=4) {
                    let v = (px[i]+px[i+1]+px[i+2])/3;
                    let res = (v > thresh) ? 255 : 0;
                    px[i]=px[i+1]=px[i+2]=res;
                }
            }
            x.putImageData(idat, 0, 0);
        }
        const r = new Image(); r.onload = () => { st.res = r; render(); }; r.src = c.toDataURL();
    }

    function setG(v) { st.p = parseInt(v); render(); }
    function up() { st.sz = document.getElementById('sS').value; document.getElementById('vS').innerText = st.sz+'%'; render(); }

    function render() {
        if(!st.res) return; 
        const g = document.getElementById('gv'); g.innerHTML = '';
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3]}[st.p];
        g.style.gridTemplateColumns = `repeat(${cfg[1]}, 1fr)`;

        for(let i=0; i<(cfg[0]*cfg[1]); i++) {
            const c = document.createElement('canvas'); c.width = A4W; c.height = A4H; 
            const x = c.getContext('2d');
            x.fillStyle = 'white'; x.fillRect(0,0,A4W,A4H);
            const w = (A4W * cfg[1] * st.sz / 100);
            const h = st.res.height * (w / st.res.width);
            const sx = (A4W * cfg[1] - w)/2 - ((i%cfg[1]) * A4W) + st.offX;
            const sy = (A4H * cfg[0] - h)/2 - (Math.floor(i/cfg[1]) * A4H) + st.offY;
            x.drawImage(st.res, sx, sy, w, h);
            const imgOut = new Image(); imgOut.src = c.toDataURL("image/png"); imgOut.className = "page-output";
            g.appendChild(imgOut);
        }
    }

    function openPrintZone() {
        const zone = document.getElementById('printZone');
        const container = document.getElementById('printContainer');
        container.innerHTML = '';
        document.querySelectorAll('.page-output').forEach((img, idx) => {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<label style="color:white;display:block;text-align:center;margin-bottom:10px;">A4 - PAGE ${idx+1}</label>`;
            const nImg = new Image(); nImg.src = img.src; nImg.style.width = "90vw"; nImg.style.border = "1px solid white";
            wrap.appendChild(nImg); container.appendChild(wrap);
        });
        zone.style.display = 'block';
    }
    function closePrintZone() { document.getElementById('printZone').style.display = 'none'; }
</script>
</body>
</html>
