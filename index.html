    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --pink: #ff007f; --cyan: #00e5ff; --green: #39ff14; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 10px 15px; border-bottom: 2px solid var(--pink); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .import-zone { background: #1a1a20; padding: 15px; border: 3px dashed var(--cyan); margin: 10px; border-radius: 12px; text-align: center; cursor: pointer; }
        .import-zone.success { border-color: var(--green); background: #0a200a; }
        .btn-load-text { color: var(--cyan); font-weight: bold; font-size: 1rem; text-transform: uppercase; }
        .action-bar { display: flex; gap: 8px; padding: 0 10px 10px; flex-shrink: 0; }
        .btn-act { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-save { background: var(--green); color: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 10px; overflow-y: auto; max-height: 50vh; flex-shrink: 0; border-bottom: 1px solid #333; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #2d2d35; }
        .card-full { grid-column: span 2; }
        label { font-size: 0.65rem; color: var(--cyan); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .val { float: right; color: white; font-family: 'Oswald'; font-size: 1rem; }

        input[type=range] { flex: 1; accent-color: var(--pink); height: 30px; }

        .joystick-container { display: flex; justify-content: center; align-items: center; background: #000; border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .joy-grid { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); gap: 5px; }

        .btn-joy:active { background: var(--pink); }

        .gabarit-header { width: 100%; padding: 10px; background: #000; color: var(--cyan); font-family: 'Oswald'; text-align: center; font-size: 0.8rem; border-top: 1px solid #333; }
        .grid-view { display: grid; gap: 15px; width: 95%; justify-items: center; margin-top: 10px; }
        .page-output { background: white; width: 100%; border: 1px solid #ddd; display: block; -webkit-touch-callout: default; }
        #printZone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 20px; }
        .close-btn { position: sticky; top: 10px; background: var(--pink); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; z-index: 1001; cursor: pointer; font-family: 'Roboto', sans-serif; font-size: 1rem; }
        .print-tip { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; color: var(--cyan); font-size: 0.8rem; line-height: 1.7; }
        .btn-toggle { flex: 1; padding: 12px; background: var(--card); color: white; border: 2px solid var(--pink); border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; }
        .btn-toggle.active { background: var(--pink); color: #000; border: none; }

<script>
    let st = {
        img: null, res: null, p: 1, sz: 100,
        offX: 0, offY: 0, orient: 'portrait',
        rot: 0, mirH: false, mirV: false
    };

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                st.img = img;
                document.getElementById('pBtn').disabled = false;
                document.getElementById('dropZone').classList.add('success');
                document.getElementById('loadStatus').innerText = "DESIGN CHARGÉ ✓";
                resetPos();
            };
            img.onerror = () => {
                document.getElementById('loadStatus').innerText = "⚠ ERREUR — IMAGE NON VALIDE";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function ch(id, d) {
        let e = document.getElementById(id);
        let v = parseFloat(e.value) + d;
        if (v >= parseFloat(e.min) && v <= parseFloat(e.max)) {
            e.value = v;
            if (id === 'sS') up(); else proc();
        }
    }

    function mv(x, y) { st.offX += x; st.offY += y; render(); }
    function resetPos() { st.offX = 0; st.offY = 0; proc(); }

    function setRot(deg) {
        st.rot = deg;
        ['R0','R90','R180','R270'].forEach(id => {
            const btn = document.getElementById('btn' + id);
            const val = parseInt(id.replace('R',''));
            btn.style.background = val === deg ? 'var(--pink)' : 'var(--card)';
            btn.style.color      = val === deg ? '#000' : 'white';
            btn.style.border     = val === deg ? 'none' : '2px solid var(--pink)';
        });
        render();
    }

    function toggleMir(axis) {
        if (axis === 'H') {
            st.mirH = !st.mirH;
            const btn = document.getElementById('btnMirH');
            btn.style.background = st.mirH ? 'var(--pink)' : 'var(--card)';
            btn.style.color      = st.mirH ? '#000' : 'white';
            btn.style.border     = st.mirH ? 'none' : '2px solid var(--pink)';
        } else {
            st.mirV = !st.mirV;
            const btn = document.getElementById('btnMirV');
            btn.style.background = st.mirV ? 'var(--pink)' : 'var(--card)';
            btn.style.color      = st.mirV ? '#000' : 'white';
            btn.style.border     = st.mirV ? 'none' : '2px solid var(--pink)';
        }
        render();
    }

    function syncVals() {
        const ids = [
            ['vThin','sThin'],['vHD','sHD'],['vN','sN'],
            ['vL','sL'],['vC','sC'],['vE','sE'],['vP','sP'],['vOp','sOp'],['vSeuil','sSeuil']
        ];
        ids.forEach(pair => {
            const vEl = document.getElementById(pair[0]);
            const sEl = document.getElementById(pair[1]);
            if (vEl && sEl) vEl.innerText = sEl.value;
        });
    }

    function proc() {
        if (!st.img) return;

        const c = document.createElement('canvas');
        c.width = st.img.width;
        c.height = st.img.height;
        const x = c.getContext('2d', { willReadFrequently: true });

        const mode = document.getElementById('mde').value,
              l    = parseInt(document.getElementById('sL').value),
              ct   = parseInt(document.getElementById('sC').value),
              hd   = parseInt(document.getElementById('sHD').value),
              n    = parseInt(document.getElementById('sN').value),
              e    = parseFloat(document.getElementById('sE').value),
              p    = parseInt(document.getElementById('sP').value),
              thin = parseInt(document.getElementById('sThin').value),
              op   = parseInt(document.getElementById('sOp').value),
              seuil = parseInt(document.getElementById('sSeuil').value);

        // Afficher/masquer le slider seuil blanc selon le mode
        document.getElementById('cardSeuil').style.display = mode === 'stencil' ? '' : 'none';

        syncVals();

        x.filter = `brightness(${l}%) contrast(${ct}%) grayscale(100%)`;
        x.drawImage(st.img, 0, 0);

        if (mode === 'orig') {
            // Appliquer opacité en mode original
            if (op < 100) {
                const idat = x.getImageData(0, 0, c.width, c.height);
                const px = idat.data;
                const alpha = op / 100;
                for (let i = 3; i < px.length; i += 4) px[i] = Math.round(px[i] * alpha);
                x.putImageData(idat, 0, 0);
            }
            st.res = c;
            render();
            return;
        }

        let idat = x.getImageData(0, 0, c.width, c.height);
        let px = idat.data;
        let outat = x.createImageData(c.width, c.height);
        let out = outat.data;

        for (let i = 0; i < out.length; i += 4) {
            out[i] = out[i+1] = out[i+2] = 255;
            out[i+3] = 255;
        }

        const w = c.width;
        const h = c.height;

        if (mode === 'stencil') {
            // ── Étape 1 : Extraction niveaux de gris ──
            const work = new Float32Array(w * h);
            for (let i = 0; i < px.length; i += 4) work[i/4] = px[i];

            // ── Étape 2 : Sharpen optionnel ──
            if (n > 1) {
                const sharpStr = n / 20;
                const sharpened = new Float32Array(work);
                for (let y = 1; y < h - 1; y++) {
                    for (let xPos = 1; xPos < w - 1; xPos++) {
                        const idx = y * w + xPos;
                        const center = work[idx];
                        const avg = (work[idx-1]+work[idx+1]+work[idx-w]+work[idx+w]+
                                     work[idx-w-1]+work[idx-w+1]+work[idx+w-1]+work[idx+w+1]) / 8;
                        sharpened[idx] = Math.max(0, Math.min(255, center + (center - avg) * sharpStr));
                    }
                }
                work.set(sharpened);
            }

            // ── Étape 3 : Normalisation levels (comme Photoshop Levels) ──
            // seuil = slider "Seuil blanc" : tout >= inputWhite → blanc pur
            // hd = point noir d'entrée (capture les demi-tons foncés)
            // thin = amincit en montant le point blanc
            const inputWhite = Math.max(20, Math.min(254, seuil - (thin * 15)));
            const inputBlack = Math.max(0, Math.min(80, hd * 1.5));

            for (let i = 0; i < work.length; i++) {
                let v = work[i];
                // Étirer [inputBlack → inputWhite] vers [0 → 255]
                v = (v - inputBlack) / Math.max(1, inputWhite - inputBlack) * 255;
                work[i] = Math.max(0, Math.min(255, v));
            }

            // ── Étape 4 : Seuillage binaire pur à 200 (fixe après normalisation) ──
            for (let i = 0; i < work.length; i++) {
                const oi = i * 4;
                out[oi] = out[oi+1] = out[oi+2] = work[i] < 200 ? 0 : 255;
                out[oi+3] = 255;
            }

            // ── Étape 5 : Dilatation selon épaisseur (e > 1) ──
            if (e > 1.0) {
                const dilated = new Uint8ClampedArray(out);
                const radius = (e - 1.0) * 0.8;
                const r = Math.ceil(radius);
                for (let y = 0; y < h; y++) {
                    for (let xPos = 0; xPos < w; xPos++) {
                        const i = (y * w + xPos) * 4;
                        if (out[i] > 0) continue;
                        for (let ky = -r; ky <= r; ky++) {
                            for (let kx = -r; kx <= r; kx++) {
                                if (Math.sqrt(kx*kx+ky*ky) > radius + 0.5) continue;
                                const nx = xPos + kx, ny = y + ky;
                                if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
                                const oi = (ny*w+nx)*4;
                                dilated[oi] = dilated[oi+1] = dilated[oi+2] = 0;
                            }
                        }
                    }
                }
                out.set(dilated);
            }

            // ── Étape 6 : Nettoyage pixels isolés ──
            const cleaned = new Uint8ClampedArray(out);
            for (let y = 1; y < h - 1; y++) {
                for (let xPos = 1; xPos < w - 1; xPos++) {
                    const i = (y * w + xPos) * 4;
                    if (out[i] > 0) continue;
                    let nb = 0;
                    if (out[i-4]===0) nb++; if (out[i+4]===0) nb++;
                    if (out[i-w*4]===0) nb++; if (out[i+w*4]===0) nb++;
                    if (out[i-w*4-4]===0) nb++; if (out[i-w*4+4]===0) nb++;
                    if (out[i+w*4-4]===0) nb++; if (out[i+w*4+4]===0) nb++;
                    if (nb < 2) cleaned[i] = cleaned[i+1] = cleaned[i+2] = 255;
                }
            }
            out.set(cleaned);

            // ── Étape 7 : Intensité noir ──
            if (p < 100) {
                const grayVal = Math.round(255 * (1 - p / 100) * 0.55);
                for (let i = 0; i < out.length; i += 4) {
                    if (out[i] === 0) out[i] = out[i+1] = out[i+2] = grayVal;
                }
            }

        } else if (mode === 'dotwork') {
            // Floyd-Steinberg complet (4 voisins)
            let tempPx = new Float32Array(px.length / 4);
            for (let i = 0; i < px.length; i += 4) tempPx[i/4] = px[i];

            const dotSize = Math.max(1, Math.floor(e));
            const threshold = 128 + (ct - 140) + (thin * 5);

            for (let y = 0; y < h; y++) {
                for (let xPos = 0; xPos < w; xPos++) {
                    const idx = y * w + xPos;
                    const oldP = Math.max(0, Math.min(255, tempPx[idx]));
                    const newP = oldP < threshold ? 0 : 255;
                    const err = (oldP - newP) / 16;

                    if (newP === 0) {
                        for (let ky = 0; ky < dotSize; ky++) {
                            for (let kx = 0; kx < dotSize; kx++) {
                                const nx = xPos + kx;
                                const ny = y + ky;
                                if (nx >= w || ny >= h) continue;
                                const oi = (ny * w + nx) * 4;
                                out[oi] = out[oi+1] = out[oi+2] = 0;
                                out[oi+3] = 255;
                            }
                        }
                    }

                    // Propagation Floyd-Steinberg complète
                    if (xPos + 1 < w)           tempPx[idx + 1]         += err * 7;
                    if (y + 1 < h && xPos > 0)  tempPx[idx + w - 1]     += err * 3;
                    if (y + 1 < h)              tempPx[idx + w]          += err * 5;
                    if (y + 1 < h && xPos + 1 < w) tempPx[idx + w + 1]  += err * 1;
                }
            }
        }

        // Appliquer opacité sur le canvas résultat (fond blanc + opacité simulée)
        if (op < 100) {
            const alpha = op / 100;
            for (let i = 0; i < out.length; i += 4) {
                // Mélange avec blanc
                out[i]   = Math.round(255 - (255 - out[i])   * alpha);
                out[i+1] = Math.round(255 - (255 - out[i+1]) * alpha);
                out[i+2] = Math.round(255 - (255 - out[i+2]) * alpha);
            }
        }

        x.putImageData(outat, 0, 0);
        st.res = c;
        render();
    }

    function setG(v) { st.p = parseInt(v); render(); }

    function up() {
        st.sz = document.getElementById('sS').value;
        document.getElementById('vS').innerText = st.sz + '%';
        render();
    }

    function setOrient(o) {
        st.orient = o;
        document.getElementById('btnPort').style.background = o === 'portrait' ? 'var(--pink)' : 'var(--card)';
        document.getElementById('btnPort').style.color      = o === 'portrait' ? '#000' : 'white';
        document.getElementById('btnPort').style.border     = o === 'portrait' ? 'none' : '2px solid var(--pink)';
        document.getElementById('btnLand').style.background = o === 'landscape' ? 'var(--pink)' : 'var(--card)';
        document.getElementById('btnLand').style.color      = o === 'landscape' ? '#000' : 'white';
        document.getElementById('btnLand').style.border     = o === 'landscape' ? 'none' : '2px solid var(--pink)';
        render();
    }

    function getTransformedCanvas() {
        if (!st.res) return null;

        // Appliquer rotation et miroir sur st.res pour obtenir un canvas transformé
        const rot = st.rot;
        const sw = st.res.width;
        const sh = st.res.height;

        const radians = rot * Math.PI / 180;
        const rotW = (rot === 90 || rot === 270) ? sh : sw;
        const rotH = (rot === 90 || rot === 270) ? sw : sh;

        const tc = document.createElement('canvas');
        tc.width = rotW;
        tc.height = rotH;
        const tx = tc.getContext('2d');

        tx.save();
        tx.translate(rotW / 2, rotH / 2);
        tx.rotate(radians);
        if (st.mirH) tx.scale(-1, 1);
        if (st.mirV) tx.scale(1, -1);
        tx.drawImage(st.res, -sw / 2, -sh / 2);
        tx.restore();

        return tc;
    }

    function render() {
        if (!st.res) return;

        const transformed = getTransformedCanvas();
        const g = document.getElementById('gv');
        g.innerHTML = '';

        const isLand = st.orient === 'landscape';
        const curW = isLand ? 1152 : 805;
        const curH = isLand ? 805  : 1152;
        const cfg = {1:[1,1], 2:[1,2], 4:[2,2], 6:[2,3], 9:[3,3], 12:[3,4]}[st.p];
        const cols = cfg[1], rows = cfg[0];

        g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        const totalW = curW * cols;
        const totalH = curH * rows;
        const fW = totalW * st.sz / 100;
        const fH = transformed.height * (fW / transformed.width);

        for (let i = 0; i < (rows * cols); i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const pc = document.createElement('canvas');
            pc.width = curW;
            pc.height = curH;
            const ctx = pc.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, curW, curH);

            const imgX = (totalW - fW) / 2 + st.offX;
            const imgY = (totalH - fH) / 2 + st.offY;
            const drawX = imgX - col * curW;
            const drawY = imgY - row * curH;

            ctx.drawImage(transformed, drawX, drawY, fW, fH);

            const imgEl = new Image();
            imgEl.src = pc.toDataURL('image/jpeg', 0.92);
            imgEl.className = 'page-output';
            g.appendChild(imgEl);
        }
    }

    function openPrintZone() {
        const zone = document.getElementById('printZone');
        const container = document.getElementById('printContainer');
        container.innerHTML = '';

        document.querySelectorAll('.page-output').forEach((img, idx) => {
            const wrap = document.createElement('div');
            wrap.style.marginBottom = '30px';

            const lbl = document.createElement('div');
            lbl.style.cssText = 'color:white;display:block;text-align:center;margin-bottom:10px;font-family:Oswald,sans-serif;';
            lbl.textContent = 'PAGE ' + (idx + 1);

            const nImg = new Image();
            nImg.src = img.src;
            nImg.style.cssText = 'width:100%;border:1px solid #555;display:block;-webkit-touch-callout:default;';

            wrap.appendChild(lbl);
            wrap.appendChild(nImg);
            container.appendChild(wrap);
        });

        zone.style.display = 'block';
    }

    function closePrintZone() {
        document.getElementById('printZone').style.display = 'none';
    }
</script>
